<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e"/>
      <stop offset="100%" style="stop-color:#0f1117"/>
    </linearGradient>
    <linearGradient id="hex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.15"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Outer hexagon (stroke) -->
  <polygon
    points="50,8 84,28 84,72 50,92 16,72 16,28"
    fill="url(#inner)"
    stroke="url(#hex)"
    stroke-width="2.5"
    stroke-linejoin="round"
  />

  <!-- Inner hexagon (smaller, rotated) -->
  <polygon
    points="50,20 72,33 72,67 50,80 28,67 28,33"
    fill="none"
    stroke="url(#hex)"
    stroke-width="1"
    stroke-linejoin="round"
    opacity="0.35"
  />

  <!-- D letter (Data) -->
  <text
    x="50" y="62"
    text-anchor="middle"
    font-family="'Outfit', 'Helvetica Neue', sans-serif"
    font-size="36"
    font-weight="800"
    fill="url(#hex)"
    letter-spacing="-1"
  >D</text>

  <!-- Small dot accent -->
  <circle cx="69" cy="34" r="3.5" fill="#f59e0b" opacity="0.9"/>
  <circle cx="31" cy="66" r="3.5" fill="#38bdf8" opacity="0.9"/>
</svg>
