      {
        "id": "l11_1",
        "title": "Duplikate, Nullwerte & Konsistenz",
        "theory": "## Enterprise Data Quality: Die 6 Dimensionen\n\nFür regulierte Unternehmen wie Vattenfall reicht es nicht, nur Namen zu prüfen. Ein vollständiges DQ-Framework prüft 6 Dimensionen:\n\n| Dimension | Frage | Beispiel |\n|-----------|-------|---------|\n| **Vollständigkeit** | Fehlende Werte? | kundennr IS NULL |\n| **Eindeutigkeit** | Duplikate? | gleiche kundennr 2x |\n| **Gültigkeit** | Format/Range korrekt? | PLZ 5-stellig? |\n| **Konsistenz** | Widersprüche? | gueltig_bis < gueltig_von |\n| **Aktualität** | Zu alt? | Adresse > 5 Jahre unverändert |\n| **Referenzintegrität** | FK vorhanden? | kundennr in Vertragstabelle? |\n\n---\n\n## SAS: Vollständiges DQ-Framework\n\n```sas\n/* ============================================\n   DQ-Framework für Kundenstammdaten\n   Vattenfall-Standard\n   ============================================ */\n\n%MACRO dq_check(ds=, out_report=dq_report);\n\n  DATA work.dq_ergebnisse;\n    SET &ds;\n\n    /* === 1. VOLLSTÄNDIGKEIT === */\n    dq_null_kundennr   = MISSING(kundennr);\n    dq_null_name       = MISSING(name);\n    dq_null_adresse    = MISSING(adresse);\n    dq_null_plz        = MISSING(plz);\n    dq_null_vertrag    = MISSING(vertragsnr);\n\n    /* === 2. EINDEUTIGKEIT (Duplikate) - in separatem PROC === */\n\n    /* === 3. GÜLTIGKEIT === */\n    dq_plz_format      = (NOT PRXMATCH('/^\\d{5}$/', STRIP(plz)));\n    dq_datum_future    = (vertrag_start > TODAY());\n    dq_verbrauch_neg   = (jahresverbrauch < 0);\n    dq_tarif_ungueltig = (tarif NOT IN ('Basis','Premium','Öko','Smart'));\n\n    /* === 4. KONSISTENZ === */\n    dq_datum_reihenfolge = (vertrag_ende < vertrag_start\n                            AND NOT MISSING(vertrag_ende));\n\n    /* === 5. REFERENZINTEGRITÄT - in separatem PROC SQL === */\n\n    /* Gesamt-Score */\n    dq_fehler_anzahl =\n      dq_null_kundennr + dq_null_name + dq_null_adresse +\n      dq_null_plz + dq_null_vertrag +\n      dq_plz_format + dq_datum_future + dq_verbrauch_neg +\n      dq_tarif_ungueltig + dq_datum_reihenfolge;\n\n    dq_klasse = IFC(dq_fehler_anzahl = 0, 'GRÜN',\n                IFC(dq_fehler_anzahl <= 2, 'GELB', 'ROT'));\n  RUN;\n\n  /* 2. DUPLIKATE finden */\n  PROC SORT DATA=work.dq_ergebnisse OUT=work.sorted; BY kundennr; RUN;\n  DATA work.dq_duplikate;\n    SET work.sorted;\n    BY kundennr;\n    IF NOT (FIRST.kundennr AND LAST.kundennr);  /* = hat Duplikat */\n    dq_duplikat = 1;\n  RUN;\n\n  /* 5. REFERENZINTEGRITÄT */\n  PROC SQL;\n    CREATE TABLE work.dq_ref AS\n    SELECT k.kundennr, 'Kein Vertrag' AS dq_problem\n    FROM &ds AS k\n    LEFT JOIN vertrag AS v ON k.kundennr = v.kundennr\n    WHERE v.kundennr IS NULL;\n  QUIT;\n\n  /* REPORT */\n  PROC SQL;\n    CREATE TABLE &out_report AS\n    SELECT\n      'Vollständigkeit' AS dimension,\n      'NULL kundennr'   AS check_name,\n      SUM(dq_null_kundennr) AS fehler_count,\n      COUNT(*)              AS gesamt,\n      ROUND(SUM(dq_null_kundennr)/COUNT(*)*100,2) AS fehler_pct\n    FROM work.dq_ergebnisse\n    UNION ALL\n    SELECT 'Eindeutigkeit', 'Duplikate', COUNT(*), (SELECT COUNT(*) FROM &ds), .\n    FROM work.dq_duplikate\n    UNION ALL\n    SELECT 'Referenz', 'Kein Vertrag', COUNT(*), (SELECT COUNT(*) FROM &ds), .\n    FROM work.dq_ref;\n  QUIT;\n\n  PROC PRINT DATA=&out_report; TITLE \"DQ-Report: &ds\"; RUN;\n%MEND;\n\n%dq_check(ds=dwh.kundenstamm, out_report=dq_report_kunden);\n```\n\n---\n\n## PySpark: DQ-Framework als wiederverwendbare Klasse\n\n```python\nfrom pyspark.sql import functions as F\nfrom dataclasses import dataclass\nfrom typing import List\n\n@dataclass\nclass DQCheck:\n    name: str\n    dimension: str\n    ausdruck: object   # PySpark Column-Ausdruck\n\nclass DQFramework:\n    \"\"\"Wiederverwendbares DQ-Framework für Vattenfall-Daten.\"\"\"\n\n    KUNDEN_CHECKS = [\n        # Vollständigkeit\n        DQCheck(\"null_kundennr\",  \"Vollständigkeit\", F.col(\"kundennr\").isNull()),\n        DQCheck(\"null_name\",      \"Vollständigkeit\", F.col(\"name\").isNull()),\n        DQCheck(\"null_plz\",       \"Vollständigkeit\", F.col(\"plz\").isNull()),\n        # Gültigkeit\n        DQCheck(\"plz_format\",     \"Gültigkeit\", ~F.col(\"plz\").rlike(r\"^\\d{5}$\")),\n        DQCheck(\"tarif_ungueltig\",\"Gültigkeit\",\n                ~F.col(\"tarif\").isin(\"Basis\",\"Premium\",\"Öko\",\"Smart\")),\n        DQCheck(\"verbrauch_neg\",  \"Gültigkeit\",  F.col(\"jahresverbrauch\") < 0),\n        # Konsistenz\n        DQCheck(\"datum_fehler\",   \"Konsistenz\",\n                F.col(\"vertrag_ende\").isNotNull() &\n                (F.col(\"vertrag_ende\") < F.col(\"vertrag_start\"))),\n    ]\n\n    def run(self, df, checks=None):\n        checks = checks or self.KUNDEN_CHECKS\n        df_scored = df\n\n        # Alle Checks als Spalten hinzufügen\n        for c in checks:\n            df_scored = df_scored.withColumn(\n                f\"dq_{c.name}\", c.ausdruck.cast(\"int\")\n            )\n\n        # Duplikate\n        from pyspark.sql.window import Window\n        w = Window.partitionBy(\"kundennr\")\n        df_scored = df_scored.withColumn(\n            \"dq_duplikat\",\n            (F.count(\"*\").over(w) > 1).cast(\"int\")\n        )\n\n        # Gesamt-Score\n        dq_cols = [f\"dq_{c.name}\" for c in checks] + [\"dq_duplikat\"]\n        df_scored = df_scored.withColumn(\n            \"dq_fehler\", sum(F.col(c) for c in dq_cols)\n        ).withColumn(\n            \"dq_klasse\",\n            F.when(F.col(\"dq_fehler\") == 0, \"GRÜN\")\n             .when(F.col(\"dq_fehler\") <= 2,  \"GELB\")\n             .otherwise(\"ROT\")\n        )\n\n        # Report\n        self._report(df_scored, checks)\n        return df_scored\n\n    def _report(self, df, checks):\n        total = df.count()\n        print(f\"\\n{'='*50}\")\n        print(f\"DQ-REPORT | {total:,} Datensätze\")\n        print(f\"{'='*50}\")\n        for c in checks:\n            n = df.filter(f\"dq_{c.name} = 1\").count()\n            pct = n / total * 100\n            status = \"✅\" if n == 0 else (\"⚠️ \" if pct < 5 else \"❌\")\n            print(f\"{status} {c.dimension:20} {c.name:25} {n:6} ({pct:.1f}%)\")\n\n        gruen = df.filter(\"dq_klasse = 'GRÜN'\").count()\n        print(f\"\\nGESAMT: {gruen/total*100:.1f}% fehlerfrei\")\n\n# Aufruf\ndq = DQFramework()\ndf_result = dq.run(spark.table(\"dwh.kundenstamm\"))\n```",
        "exercise": {
          "description": "Implementiere einen DQ-Check für Vertragsdaten mit: 1) NULL-Checks für vertragsnr und kundennr, 2) Konsistenz-Check (vertrag_ende >= vertrag_start), 3) Gültigkeit (tarif nur 'Basis','Premium','Öko'), 4) DQ-Klasse GRÜN/GELB/ROT.",
          "sasSolution": "DATA dq_vertrag;\n  SET dwh.vertraege;\n\n  /* Vollständigkeit */\n  dq_null_vnr  = MISSING(vertragsnr);\n  dq_null_knr  = MISSING(kundennr);\n\n  /* Konsistenz */\n  dq_datum = (NOT MISSING(vertrag_ende) AND vertrag_ende < vertrag_start);\n\n  /* Gültigkeit */\n  dq_tarif = (tarif NOT IN ('Basis','Premium','Öko'));\n\n  /* Score */\n  dq_fehler = dq_null_vnr + dq_null_knr + dq_datum + dq_tarif;\n  dq_klasse = IFC(dq_fehler = 0, 'GRÜN',\n              IFC(dq_fehler <= 1, 'GELB', 'ROT'));\nRUN;\n\nPROC FREQ DATA=dq_vertrag;\n  TABLES dq_klasse dq_tarif dq_datum;\nRUN;",
          "pysparkSolution": "from pyspark.sql import functions as F\n\ndf = spark.table('dwh.vertraege')\n\ndf_dq = df \\\n    .withColumn('dq_null_vnr', F.col('vertragsnr').isNull().cast('int')) \\\n    .withColumn('dq_null_knr', F.col('kundennr').isNull().cast('int')) \\\n    .withColumn('dq_datum',\n        (F.col('vertrag_ende').isNotNull() &\n         (F.col('vertrag_ende') < F.col('vertrag_start'))).cast('int')) \\\n    .withColumn('dq_tarif',\n        (~F.col('tarif').isin('Basis','Premium','Öko')).cast('int')) \\\n    .withColumn('dq_fehler',\n        F.col('dq_null_vnr') + F.col('dq_null_knr') +\n        F.col('dq_datum') + F.col('dq_tarif')) \\\n    .withColumn('dq_klasse',\n        F.when(F.col('dq_fehler') == 0, 'GRÜN')\n         .when(F.col('dq_fehler') <= 1, 'GELB')\n         .otherwise('ROT'))\n\ndf_dq.groupBy('dq_klasse').count().orderBy('dq_klasse').show()",
          "hints": [
            "IFC(bedingung, wahr, falsch) ist SAS-Äquivalent zu IF-ELSE in einer Zuweisung",
            "F.col().isin() mit ~ (NOT) für 'nicht in Liste'",
            "Cast zu 'int' wandelt True/False in 1/0 um — damit kann man summieren"
          ]
        }
      }
    ]

      {
        "id": "l12_1",
        "title": "GDPR, Datenmaskierung & Audit Trails",
        "theory": "## Compliance im Energiesektor\n\nVattenfall verarbeitet hochsensible Daten: Stromverbrauch zeigt wann jemand zuhause ist, Kundendaten sind DSGVO-pflichtig, und die Bundesnetzagentur kann Audits verlangen.\n\n---\n\n## Die wichtigsten Compliance-Anforderungen\n\n| Regelwerk | Was wird verlangt? |\n|-----------|-------------------|\n| **DSGVO/GDPR** | Datenlöschung, Auskunft, Pseudonymisierung |\n| **Bundesnetzagentur** | Messdaten 6 Jahre aufbewahren |\n| **SOX (wenn börsennotiert)** | Änderungs-Audit-Trail |\n| **ISO 27001** | Zugriffskontrolle, Logging |\n\n---\n\n## SAS: Datenmaskierung & Pseudonymisierung\n\n```sas\n/* ============================================\n   DSGVO-konforme Datenmaskierung\n   ============================================ */\n\n/* 1. Pseudonymisierung: Namen durch Hash-ID ersetzen */\nDATA dwh.kunden_pseudonym;\n  SET dwh.kundenstamm;\n\n  /* Nur für Analyse-Zwecke: echte Daten maskieren */\n  name_maskiert = REPEAT('*', LENGTH(STRIP(name)) - 2)\n                  || SUBSTR(STRIP(name), LENGTH(STRIP(name))-1, 2);\n  /* Mueller → *****er */\n\n  /* Email: nur Domain behalten */\n  IF INDEX(email, '@') > 0 THEN\n    email_maskiert = '***@' || SCAN(email, 2, '@');\n  /* max.mueller@vattenfall.de → ***@vattenfall.de */\n\n  /* Geburtsdatum: nur Jahr behalten */\n  geburtsjahr = YEAR(geburtsdatum);\n\n  /* Originaldaten NICHT in Analyse-Views ausgeben */\n  DROP name email geburtsdatum;\nRUN;\n\n/* 2. Audit Trail: Wer hat was wann geändert? */\nDATA dwh.audit_log;\n  SET dwh.kundenstamm;\n  BY kundennr;\n\n  RETAIN _alter_tarif;\n  IF NOT FIRST.kundennr THEN DO;\n    IF tarif NE _alter_tarif THEN DO;\n      aenderung_typ = 'TARIF_WECHSEL';\n      alter_wert    = _alter_tarif;\n      neuer_wert    = tarif;\n      geaendert_am  = TODAY();\n      /* In separates Log schreiben */\n      OUTPUT;\n    END;\n  END;\n  _alter_tarif = tarif;\n  DROP _alter_tarif;\nRUN;\n\n/* 3. Recht auf Löschung (DSGVO Art. 17) */\n%MACRO loeschung_durchfuehren(kundennr=);\n  /* Echte Daten anonymisieren statt löschen\n     (Geschäftspflichten beachten!) */\n  PROC SQL;\n    UPDATE dwh.kundenstamm\n    SET\n      name         = 'ANONYM',\n      email        = 'geloescht@dsgvo.de',\n      adresse      = 'GELOESCHT',\n      telefon      = '',\n      geloescht_am = TODAY(),\n      loeschgrund  = 'DSGVO Art. 17 - Antrag des Betroffenen'\n    WHERE kundennr = \"&kundennr\";\n  QUIT;\n\n  %PUT AUDIT: Löschung K&kundennr durchgeführt am &SYSDATE;\n%MEND;\n```\n\n---\n\n## PySpark: Column-Level Masking & Audit\n\n```python\nfrom pyspark.sql import functions as F\nimport hashlib\n\n# ============================================\n# 1. Pseudonymisierung mit konsistentem Hash\n# ============================================\n\n@F.udf(\"string\")\ndef pseudo_hash(wert):\n    \"\"\"Konsistente Pseudonymisierung: gleicher Input → gleicher Hash.\n    So können Datensätze noch verknüpft werden, ohne echte Daten zu sehen.\"\"\"\n    if wert is None: return None\n    return hashlib.sha256((\"SALT_VATTENFALL_2025\" + wert)\n                          .encode()).hexdigest()[:12]\n\ndf_pseudonym = spark.table(\"dwh.kundenstamm\")     .withColumn(\"kundennr_pseudo\", pseudo_hash(\"kundennr\"))     .withColumn(\"name_pseudo\",\n        F.concat(\n            F.regexp_replace(\"name\", r\".(?=.{2})\", \"*\"),\n        )\n    )     .withColumn(\"email_pseudo\",\n        F.concat(F.lit(\"***@\"),\n                 F.split(\"email\", \"@\").getItem(1))\n    )     .withColumn(\"geburtsjahr\", F.year(\"geburtsdatum\"))     .drop(\"kundennr\", \"name\", \"email\", \"geburtsdatum\", \"telefon\")\n\n# ============================================\n# 2. Row-Level Security: Nur eigene Region sehen\n# ============================================\n\ndef get_secure_view(spark, user_region):\n    \"\"\"Gibt nur Daten zurück, auf die der User Zugriff hat.\"\"\"\n    return spark.table(\"dwh.kundenstamm\")         .filter(F.col(\"region\") == user_region)\n\n# ============================================\n# 3. Audit Trail für alle Datenänderungen\n# ============================================\n\ndef log_aenderung(spark, tabelle, kundennr, spalte, alt, neu, user):\n    audit = spark.createDataFrame([{\n        \"tabelle\":    tabelle,\n        \"kundennr\":   kundennr,\n        \"spalte\":     spalte,\n        \"alter_wert\": str(alt),\n        \"neuer_wert\": str(neu),\n        \"geaendert_von\": user,\n        \"geaendert_am\":  F.current_timestamp(),\n    }])\n    audit.write.mode(\"append\").saveAsTable(\"compliance.audit_trail\")\n\n# ============================================\n# 4. DSGVO: Löschung / Anonymisierung\n# ============================================\n\ndef dsgvo_loeschung(spark, kundennr, grund=\"Art. 17 Antrag\"):\n    spark.sql(f\"\"\"\n        UPDATE dwh.kundenstamm\n        SET\n            name         = 'ANONYM',\n            email        = 'geloescht@dsgvo.de',\n            adresse      = 'GELOESCHT',\n            geloescht_am = current_date(),\n            loeschgrund  = '{grund}'\n        WHERE kundennr = '{kundennr}'\n    \"\"\")\n    log_aenderung(spark, \"kundenstamm\", kundennr,\n                  \"VOLLLOESCHUNG\", \"AKTIV\", \"ANONYM\", \"DSGVO-PROZESS\")\n    print(f\"✅ Kunde {kundennr} anonymisiert\")\n```\n\n---\n\n## Bundesnetzagentur: Messdatenpflicht\n\n```python\n# Zählerdaten MÜSSEN 6 Jahre aufbewahrt werden\n# Auch gelöschte Kunden!\n\ndef archiviere_messdaten(spark, zaehler_id, jahr):\n    \"\"\"Jahresarchiv für Bundesnetzagentur erstellen.\"\"\"\n    df = spark.table(\"raw.zaehler_15min\")         .filter(f\"zaehler_id = '{zaehler_id}' AND year(messzeitpunkt) = {jahr}\")\n\n    # In unveränderlichem Cold Storage schreiben\n    df.write         .format(\"parquet\")         .mode(\"overwrite\")         .option(\"path\", f\"abfss://archiv@storage.dfs.core.windows.net/\"\n                        f\"messdaten/{jahr}/{zaehler_id}\")         .save()\n\n    print(f\"✅ {df.count()} Messwerte archiviert für {zaehler_id}/{jahr}\")\n```",
        "exercise": {
          "description": "Implementiere DSGVO-Datenmaskierung: 1) Name → erste 2 Zeichen + '***', 2) Email → nur Domain behalten, 3) PLZ → nur erste 2 Stellen ('20***'), 4) Audit-Log-Eintrag für jeden maskierten Datensatz.",
          "sasSolution": "/* DSGVO Maskierung */\nDATA kunden_maskiert;\n  SET dwh.kundenstamm;\n\n  /* Name maskieren */\n  name_anon = SUBSTR(name, 1, 2) || REPEAT('*', MAX(LENGTH(STRIP(name))-2, 0));\n\n  /* Email: nur Domain */\n  IF INDEX(email, '@') > 0 THEN\n    email_anon = '***@' || SCAN(email, -1, '@');\n\n  /* PLZ: nur Bereich */\n  plz_anon = SUBSTR(plz, 1, 2) || '***';\n\n  /* Audit */\n  maskiert_am = TODAY();\n  maskiert_von = SYMGET('SYSUSERID');\n\n  DROP name email plz;\n  RENAME name_anon=name email_anon=email plz_anon=plz;\nRUN;\n\n%PUT INFO: &NOBS Datensätze maskiert am &SYSDATE;",
          "pysparkSolution": "from pyspark.sql import functions as F\n\ndf = spark.table('dwh.kundenstamm')\n\ndf_maskiert = df \\\n    .withColumn('name',\n        F.concat(\n            F.substring('name', 1, 2),\n            F.regexp_replace('name', r'.', '*')\n             .substr(3, 100)\n        )\n    ) \\\n    .withColumn('email',\n        F.concat(F.lit('***@'),\n                 F.split('email', '@').getItem(1))\n    ) \\\n    .withColumn('plz',\n        F.concat(F.substring('plz', 1, 2), F.lit('***'))\n    ) \\\n    .withColumn('maskiert_am', F.current_date()) \\\n    .withColumn('maskiert_von', F.lit('DSGVO-PROZESS'))\n\ndf_maskiert.write.mode('overwrite').saveAsTable('dwh.kunden_anon')\nprint(f'{df_maskiert.count()} Datensätze maskiert')",
          "hints": [
            "SCAN(str, -1, '@') gibt in SAS das letzte Token nach '@' zurück",
            "F.split('email','@').getItem(1) gibt den Teil nach '@' zurück",
            "SYMGET('SYSUSERID') gibt den aktuellen SAS-Username zurück"
          ]
        }
      }
    ]

    "id": "m13",
    "title": "SAS-Makroprogrammierung",
    "icon": "🔧",
    "lessons": [
      {
        "id": "l13_1",
        "title": "Wiederverwendbare Makros & Automatisierung",
        "theory": "## Warum Makros? Das Problem ohne sie\n\nStell dir vor: Du erstellst monatlich Reports für 12 Regionen, 5 Tarifklassen und 3 Kundengruppen. Das sind 180 fast-identische Reports. Mit Copy-Paste bist du tagelang beschäftigt — und bei einer Änderung musst du alle 180 anpassen.\n\n**Makros lösen das:** Einmal schreiben, 180× automatisch ausführen.\n\n---\n\n## SAS-Makros: Grundstruktur\n\n```sas\n/* Einfaches Makro */\n%MACRO begruessung(name=Welt, sprache=DE);\n  %IF &sprache = DE %THEN %DO;\n    %PUT Hallo, &name!;\n  %END;\n  %ELSE %DO;\n    %PUT Hello, &name!;\n  %END;\n%MEND;\n\n%begruessung(name=Vattenfall, sprache=DE)\n/* Output: Hallo, Vattenfall! */\n```\n\n---\n\n## Praxismakro: Monatsbericht für alle Regionen\n\n```sas\n/* ============================================\n   MAKRO: Automatischer Monatsbericht\n   Läuft für jede Region + jeden Monat\n   ============================================ */\n\n%MACRO monatsbericht(\n  region   = ALLE,\n  monat    = %SYSFUNC(MONTH(TODAY())),\n  jahr     = %SYSFUNC(YEAR(TODAY())),\n  ausgabe  = PRINT   /* PRINT oder PDF */\n);\n\n  %PUT ==========================================;\n  %PUT Starte Bericht: Region=&region, &monat/&jahr;\n  %PUT ==========================================;\n\n  /* Datumsgrenzen berechnen */\n  %LET von = %SYSFUNC(MDY(&monat, 1, &jahr), DATE9.);\n  %LET bis = %SYSFUNC(\n    INTNX(MONTH, %SYSFUNC(MDY(&monat,1,&jahr)), 0, E),\n    DATE9.\n  );\n\n  /* Daten filtern */\n  PROC SQL;\n    CREATE TABLE work.bericht_&region._&monat._&jahr AS\n    SELECT\n      region,\n      COUNT(DISTINCT kundennr)   AS kunden_aktiv,\n      SUM(verbrauch_kwh)         AS verbrauch_gesamt,\n      SUM(umsatz_eur)            AS umsatz_gesamt,\n      AVG(verbrauch_kwh)         AS verbrauch_avg\n    FROM dwh.verbrauchsdaten\n    WHERE (\"%SYSFUNC(INPUT(&von,DATE9.))\"d <= messdatum <= \"%SYSFUNC(INPUT(&bis,DATE9.))\"d)\n    %IF &region NE ALLE %THEN %DO;\n      AND UPCASE(region) = \"%UPCASE(&region)\"\n    %END;\n    GROUP BY region;\n  QUIT;\n\n  /* Ausgabe */\n  %IF &ausgabe = PDF %THEN %DO;\n    ODS PDF FILE=\"report_&region._&monat._&jahr..pdf\"\n            STYLE=Harvest;\n  %END;\n\n  PROC PRINT DATA=work.bericht_&region._&monat._&jahr NOOBS;\n    TITLE \"Monatsbericht &monat/&jahr — Region: &region\";\n    FORMAT verbrauch_gesamt umsatz_gesamt COMMA12.;\n  RUN;\n\n  %IF &ausgabe = PDF %THEN %DO;\n    ODS PDF CLOSE;\n  %END;\n\n  %PUT Bericht fertig: work.bericht_&region._&monat._&jahr;\n%MEND;\n\n/* Alle Regionen auf einmal */\n%MACRO alle_regionen_bericht(monat=, jahr=);\n  %DO i = 1 %TO %NOBS(regionen_liste);\n    %LET reg = %SCAN(&regionen_liste, &i, #);\n    %monatsbericht(region=&reg, monat=&monat, jahr=&jahr, ausgabe=PDF);\n  %END;\n%MEND;\n\n/* Aufruf für aktuellen Monat, alle Regionen */\n%monatsbericht(region=NORD, ausgabe=PDF)\n%monatsbericht(region=SÜD, monat=1, jahr=2025, ausgabe=PDF)\n%monatsbericht(region=ALLE)\n```\n\n---\n\n## PySpark: Wiederverwendbare Funktionen & Klassen\n\n```python\nfrom pyspark.sql import functions as F\nfrom typing import Optional\nfrom datetime import date, datetime\nimport calendar\n\ndef monatsbericht(\n    spark,\n    region:  Optional[str] = None,\n    monat:   int  = date.today().month,\n    jahr:    int  = date.today().year,\n    ausgabe: str  = \"show\"\n):\n    \"\"\"\n    Automatischer Monatsbericht für Energie-Verbrauchsdaten.\n    region=None → alle Regionen\n    \"\"\"\n    von = date(jahr, monat, 1)\n    bis = date(jahr, monat, calendar.monthrange(jahr, monat)[1])\n\n    print(f\"\\n{'='*50}\")\n    print(f\"Monatsbericht {monat:02d}/{jahr}\"\n          + (f\" | Region: {region}\" if region else \" | Alle Regionen\"))\n    print(f\"Zeitraum: {von} bis {bis}\")\n    print(f\"{'='*50}\")\n\n    df = spark.table(\"dwh.verbrauchsdaten\")         .filter(F.col(\"messdatum\").between(str(von), str(bis)))\n\n    if region:\n        df = df.filter(F.upper(\"region\") == region.upper())\n\n    bericht = df.groupBy(\"region\").agg(\n        F.countDistinct(\"kundennr\").alias(\"kunden_aktiv\"),\n        F.round(F.sum(\"verbrauch_kwh\"), 2).alias(\"verbrauch_kwh\"),\n        F.round(F.sum(\"umsatz_eur\"), 2).alias(\"umsatz_eur\"),\n        F.round(F.avg(\"verbrauch_kwh\"), 2).alias(\"avg_kwh_kunde\")\n    ).orderBy(\"region\")\n\n    if ausgabe == \"show\":\n        bericht.show(truncate=False)\n    elif ausgabe == \"save\":\n        bericht.write.mode(\"overwrite\")             .saveAsTable(f\"reports.monat_{monat:02d}_{jahr}\")\n        print(f\"✅ Gespeichert: reports.monat_{monat:02d}_{jahr}\")\n    elif ausgabe == \"excel\":\n        bericht.toPandas().to_excel(\n            f\"bericht_{region or 'alle'}_{monat:02d}_{jahr}.xlsx\",\n            index=False\n        )\n\n    return bericht\n\n# Alle Regionen automatisch berichten\ndef alle_regionen_berichten(spark, monat, jahr):\n    regionen = spark.table(\"dwh.verbrauchsdaten\")         .select(\"region\").distinct()         .rdd.flatMap(lambda x: x).collect()\n\n    for reg in regionen:\n        monatsbericht(spark, region=reg, monat=monat, jahr=jahr,\n                      ausgabe=\"save\")\n\n# Aufruf\nmonatsbericht(spark, region=\"NORD\", ausgabe=\"show\")\nalle_regionen_berichten(spark, monat=1, jahr=2025)\n```",
        "exercise": {
          "description": "Schreibe ein SAS-Makro / eine PySpark-Funktion, die für einen gegebenen Tarif ('Basis','Premium','Öko') eine Zusammenfassung erstellt: Anzahl Kunden, Durchschnittsverbrauch, Gesamtumsatz. Das Makro soll für alle Tarife auf einmal ausführbar sein.",
          "sasSolution": "%MACRO tarif_report(tarif=);\n  PROC SQL;\n    CREATE TABLE work.report_&tarif AS\n    SELECT\n      tarif,\n      COUNT(DISTINCT kundennr)  AS kunden,\n      ROUND(AVG(verbrauch_kwh), 2) AS avg_verbrauch,\n      SUM(umsatz_eur)           AS umsatz_gesamt\n    FROM dwh.verbrauchsdaten\n    WHERE UPCASE(tarif) = \"%UPCASE(&tarif)\";\n  QUIT;\n  PROC PRINT DATA=work.report_&tarif NOOBS;\n    TITLE \"Tarif-Report: &tarif\";\n  RUN;\n%MEND;\n\n/* Alle Tarife auf einmal */\n%tarif_report(tarif=Basis)\n%tarif_report(tarif=Premium)\n%tarif_report(tarif=Öko)",
          "pysparkSolution": "from pyspark.sql import functions as F\n\ndef tarif_report(spark, tarif=None):\n    df = spark.table('dwh.verbrauchsdaten')\n    if tarif:\n        df = df.filter(F.upper('tarif') == tarif.upper())\n\n    return df.groupBy('tarif').agg(\n        F.countDistinct('kundennr').alias('kunden'),\n        F.round(F.avg('verbrauch_kwh'), 2).alias('avg_verbrauch'),\n        F.round(F.sum('umsatz_eur'), 2).alias('umsatz_gesamt')\n    ).orderBy('tarif')\n\n# Alle Tarife\nfor t in ['Basis', 'Premium', 'Öko']:\n    print(f'\\n--- {t} ---')\n    tarif_report(spark, t).show()\n\n# Oder alle auf einmal\ntarif_report(spark).show()",
          "hints": [
            "%UPCASE(&tarif) wandelt Makrovariable in Großbuchstaben um",
            "In PySpark: F.upper('tarif') == tarif.upper() für case-insensitiven Vergleich",
            "Ohne tarif-Filter gibt die Funktion alle Tarife zurück — nützlich für Überblick"
          ]
        }
      }
    ]
  }

{
  "id": "m14",
  "title": "SAS Kernfunktionen",
  "icon": "🔤",
  "lessons": [
    {
      "id": "l14_1",
      "title": "DROP, KEEP & RENAME: Variablen steuern",
      "theory": "## Warum Variablen-Steuerung wichtig ist\n\nAus SAP kommen oft 200+ Spalten. Du brauchst vielleicht 12. Ohne DROP/KEEP landen alle im Output — das kostet Speicher, verlangsamt Joins und macht den Code unlesbar.\n\n---\n\n## DROP — Spalten entfernen\n\n```sas\n/* DROP: bestimmte Spalten NICHT ausgeben */\nDATA kunden_clean;\n  SET sap.kundenstamm;\n  DROP _error_   /* SAS-interne Hilfsvariable */\n       rohfeld1 rohfeld2 rohfeld3   /* technische Felder */\n       debug_flag;                  /* nur fuer Debugging */\nRUN;\n\n/* Alternativ: DROP= Option direkt im SET */\nDATA kunden_clean;\n  SET sap.kundenstamm (DROP=rohfeld1-rohfeld5 debug_flag);\nRUN;\n/* Vorteil: Felder werden gar nicht erst eingelesen — schneller! */\n```\n\n---\n\n## KEEP — nur bestimmte Spalten behalten\n\n```sas\n/* KEEP: nur DIESE Spalten ausgeben */\nDATA kunden_kern;\n  SET sap.kundenstamm;\n  KEEP kundennr\n       name\n       adresse\n       plz\n       tarif\n       vertragsnr\n       vertrag_start;\nRUN;\n\n/* KEEP= Option im SET — effizienter */\nDATA kunden_kern;\n  SET sap.kundenstamm (KEEP=kundennr name adresse plz tarif vertragsnr);\nRUN;\n\n/* Unterschied DROP vs KEEP:\n   DROP = Ausschlussliste (behalte alles ausser...)\n   KEEP = Einschlussliste (behalte NUR das...)\n   -> KEEP ist sicherer wenn neue Spalten hinzukommen */\n```\n\n---\n\n## RENAME — Spalten umbenennen\n\n```sas\n/* RENAME: Spaltennamen aendern */\nDATA kunden_dwh;\n  SET sap.kundenstamm;\n  RENAME kundennr     = kunde_id        /* SAP-Name -> DWH-Name */\n         bp_name      = kundenname      /* Business Partner Name */\n         bp_adresse   = adresse_str     /* Strasse */\n         bp_ort       = wohnort;        /* Ort */\nRUN;\n\n/* RENAME= Option im SET */\nDATA kunden_dwh;\n  SET sap.kundenstamm (\n    RENAME=(kundennr=kunde_id\n            bp_name=kundenname\n            bp_adresse=adresse_str)\n  );\nRUN;\n\n/* Kombiniert: KEEP + RENAME + WHERE in einem Schritt */\nDATA kunden_aktiv;\n  SET sap.kundenstamm (\n    KEEP   = kundennr bp_name tarif status\n    RENAME = (kundennr=kunde_id bp_name=kundenname)\n    WHERE  = (status = 'AKTIV')\n  );\nRUN;\n```\n\n---\n\n## PySpark: select, drop, withColumnRenamed\n\n```python\nfrom pyspark.sql import functions as F\n\ndf = spark.table(\"sap.kundenstamm\")\n\n# DROP: Spalten entfernen\ndf_clean = df.drop(\"rohfeld1\", \"rohfeld2\", \"rohfeld3\", \"debug_flag\", \"_error_\")\n\n# SELECT (wie KEEP): nur bestimmte Spalten\ndf_kern = df.select(\n    \"kundennr\", \"name\", \"adresse\", \"plz\", \"tarif\", \"vertragsnr\"\n)\n\n# Oder mit F.col() fuer mehr Kontrolle\ndf_kern = df.select(\n    F.col(\"kundennr\"),\n    F.col(\"bp_name\").alias(\"kundenname\"),    # rename direkt beim select\n    F.col(\"tarif\"),\n    F.col(\"vertrag_start\")\n)\n\n# withColumnRenamed: einzelne Spalten umbenennen\ndf_renamed = df     .withColumnRenamed(\"kundennr\",   \"kunde_id\")     .withColumnRenamed(\"bp_name\",    \"kundenname\")     .withColumnRenamed(\"bp_adresse\", \"adresse_str\")\n\n# Kombiniert: filter + select + rename\ndf_aktiv = df     .filter(F.col(\"status\") == \"AKTIV\")     .select(\n        F.col(\"kundennr\").alias(\"kunde_id\"),\n        F.col(\"bp_name\").alias(\"kundenname\"),\n        \"tarif\", \"vertrag_start\"\n    )\n\n# Alle Spalten ausser bestimmten (wie DROP)\nbehalte = [c for c in df.columns if c not in [\"rohfeld1\",\"rohfeld2\",\"debug_flag\"]]\ndf_clean = df.select(behalte)\n```\n\n---\n\n## Wann was verwenden?\n\n| Situation | SAS | PySpark |\n|-----------|-----|---------|\n| Viele Spalten entfernen | `DROP=` im SET | `.drop()` |\n| Nur wenige behalten | `KEEP=` im SET | `.select()` |\n| Spalten umbenennen | `RENAME=` im SET | `.alias()` oder `.withColumnRenamed()` |\n| Alles kombiniert | SET mit mehreren Optionen | `.filter().select()` Chain |",
      "exercise": {
        "description": "Du hast eine SAP-Tabelle mit den Spalten: kundennr, bp_name, bp_adresse, plz, tarif, jahresverbrauch, rohfeld1, rohfeld2, sap_mandant, erstellungsdatum. Behalte nur die relevanten Felder, benenne bp_name in kundenname um und filtere auf aktive Kunden (status='AKTIV').",
        "sasSolution": "/* DROP/KEEP/RENAME Uebung */\n\n/* Variante 1: KEEP + RENAME kombiniert */\nDATA kunden_bereinigt;\n  SET sap.kundenstamm (\n    KEEP   = kundennr bp_name bp_adresse plz tarif jahresverbrauch status\n    RENAME = (bp_name=kundenname bp_adresse=adresse)\n    WHERE  = (status = 'AKTIV')\n  );\n  DROP status;  /* nach Filter nicht mehr benoetigt */\nRUN;\n\nPROC PRINT DATA=kunden_bereinigt (OBS=10) NOOBS;\n  TITLE 'Bereinigte Kundendaten';\nRUN;\n\n%PUT INFO: &SYSNOBS Aktive Kunden ausgewaehlt;",
        "pysparkSolution": "from pyspark.sql import functions as F\n\ndf = spark.table('sap.kundenstamm')\n\ndf_bereinigt = df \\\n    .filter(F.col('status') == 'AKTIV') \\\n    .select(\n        F.col('kundennr'),\n        F.col('bp_name').alias('kundenname'),\n        F.col('bp_adresse').alias('adresse'),\n        'plz', 'tarif', 'jahresverbrauch'\n    )\n\nprint(f'Aktive Kunden: {df_bereinigt.count()}')\ndf_bereinigt.show(10, truncate=False)",
        "hints": [
          "KEEP= und RENAME= koennen direkt im SET gesetzt werden — das ist effizienter als im DATA Step",
          "In PySpark ersetzt .select() mit .alias() sowohl KEEP als auch RENAME in einem Schritt",
          "WHERE= im SET-Statement filtert BEVOR Daten eingelesen werden — schneller als nachtraegliches IF"
        ]

      "id": "l14_2",
      "title": "CAT, CATX & CATS: Strings verbinden",
      "theory": "## Das Problem: Teile zusammensetzen\n\nKundennamen kommen oft aufgeteilt: Vorname, Nachname, Titel getrennt. Adressen in Strasse, Hausnummer, PLZ, Ort. Du musst sie fuer Briefe, Reports oder Vergleiche zusammensetzen.\n\n---\n\n## Die CAT-Funktionen im Ueberblick\n\n| Funktion | Was sie macht | Leerzeichen |\n|----------|---------------|-------------|\n| `CAT` | Verbindet direkt | behaelt alle |\n| `CATS` | Verbindet + trimmt | trimmt fuehrende/abschliessende |\n| `CATX` | Verbindet mit Trennzeichen | trimmt + Separator |\n| `CATT` | Verbindet + trimmt trailing | trimmt nur abschliessende |\n\n---\n\n## CAT — einfache Verkettung\n\n```sas\nDATA adressen;\n  SET kundenstamm;\n\n  /* CAT: verbindet OHNE automatisches Trimmen */\n  adresse_lang = CAT(strasse, ' ', hausnr, ', ', plz, ' ', ort);\n  /* Ergebnis: 'Musterstrasse   42, 20095 Hamburg' (mit Leerzeichen!) */\n\n  /* Problem: wenn strasse = 'Musterstrasse   ' (trailing spaces)\n     dann hat adresse_lang ungewollte Leerzeichen */\nRUN;\n```\n\n---\n\n## CATS — mit automatischem Trimmen\n\n```sas\nDATA kunden_vollname;\n  SET kundenstamm;\n\n  /* CATS: trimmt alle Teile, dann verbinden */\n  vollname = CATS(nachname, ', ', vorname);\n  /* Ergebnis: 'Mueller, Hans' (sauber getrimmt) */\n\n  /* Titel optional hinzufuegen */\n  IF titel NE '' THEN\n    vollname_mit_titel = CATS(titel, ' ', vorname, ' ', nachname);\n  ELSE\n    vollname_mit_titel = CATS(vorname, ' ', nachname);\nRUN;\n```\n\n---\n\n## CATX — mit Trennzeichen (empfohlen!)\n\n```sas\nDATA adress_komplett;\n  SET kundenstamm;\n\n  /* CATX(separator, arg1, arg2, ...) */\n  /* Separator ist IMMER das erste Argument */\n\n  /* Vollstaendige Adresse */\n  adresse_einzeilig = CATX(', ', strasse, hausnr, plz, ort);\n  /* Ergebnis: 'Musterstrasse, 42, 20095, Hamburg' */\n\n  /* Besser: Strasse+Hausnr zusammen, dann PLZ+Ort */\n  strasse_nr   = CATX(' ', strasse, hausnr);\n  plz_ort      = CATX(' ', plz, ort);\n  adresse_norm = CATX(', ', strasse_nr, plz_ort);\n  /* Ergebnis: 'Musterstrasse 42, 20095 Hamburg' */\n\n  /* Kundenschluessel aus mehreren Feldern */\n  kunde_key = CATX('_', kundennr, vertragsnr, tarif);\n  /* Ergebnis: 'K001_V2024001_PREMIUM' */\n\n  /* CATX ignoriert leere Strings automatisch! */\n  /* Falls titel leer: CATX(' ', titel, vorname, nachname) */\n  /* -> 'Hans Mueller' (KEIN doppeltes Leerzeichen) */\n  vollname = CATX(' ', titel, vorname, nachname);\nRUN;\n```\n\n---\n\n## Praxisbeispiel: Briefanrede generieren\n\n```sas\nDATA kunden_anrede;\n  SET kundenstamm;\n\n  /* Anrede je nach Geschlecht und Titel */\n  IF geschlecht = 'M' THEN anrede_basis = 'Sehr geehrter Herr';\n  ELSE IF geschlecht = 'W' THEN anrede_basis = 'Sehr geehrte Frau';\n  ELSE anrede_basis = 'Sehr geehrte Damen und Herren';\n\n  /* Mit Titel: 'Sehr geehrter Herr Dr. Mueller' */\n  IF titel NE '' THEN\n    briefanrede = CATX(' ', anrede_basis, titel, nachname);\n  ELSE\n    briefanrede = CATX(' ', anrede_basis, nachname);\n\n  /* Ohne Titel: 'Sehr geehrter Herr Mueller' */\nRUN;\n```\n\n---\n\n## PySpark: concat, concat_ws\n\n```python\nfrom pyspark.sql import functions as F\n\ndf = spark.table(\"kundenstamm\")\n\n# F.concat() = wie CAT (kein automatisches Trimmen)\ndf = df.withColumn(\"adresse_lang\",\n    F.concat(F.col(\"strasse\"), F.lit(\" \"), F.col(\"hausnr\"),\n             F.lit(\", \"), F.col(\"plz\"), F.lit(\" \"), F.col(\"ort\"))\n)\n\n# F.concat_ws() = wie CATX (mit Separator, ignoriert NULL)\ndf = df.withColumn(\"adresse_norm\",\n    F.concat_ws(\", \",\n        F.concat_ws(\" \", F.trim(\"strasse\"), F.trim(\"hausnr\")),\n        F.concat_ws(\" \", F.trim(\"plz\"), F.trim(\"ort\"))\n    )\n)\n\n# Kundenschluessel\ndf = df.withColumn(\"kunde_key\",\n    F.concat_ws(\"_\", \"kundennr\", \"vertragsnr\", \"tarif\")\n)\n\n# Briefanrede\ndf = df.withColumn(\"briefanrede\",\n    F.when(F.col(\"geschlecht\") == \"M\",\n        F.concat_ws(\" \",\n            F.lit(\"Sehr geehrter Herr\"),\n            F.when(F.col(\"titel\") != \"\", F.col(\"titel\")),\n            F.col(\"nachname\")\n        )\n    ).when(F.col(\"geschlecht\") == \"W\",\n        F.concat_ws(\" \",\n            F.lit(\"Sehr geehrte Frau\"),\n            F.when(F.col(\"titel\") != \"\", F.col(\"titel\")),\n            F.col(\"nachname\")\n        )\n    ).otherwise(F.lit(\"Sehr geehrte Damen und Herren\"))\n)\n\n# Trim vor Verkettung (wie CATS)\ndf = df.withColumn(\"vollname\",\n    F.concat_ws(\" \",\n        F.trim(\"vorname\"),\n        F.trim(\"nachname\")\n    )\n)\n```\n\n---\n\n## Wichtiger Unterschied: NULL-Behandlung\n\n```sas\n/* SAS: CAT/CATX mit fehlenden Werten */\nx = CATX('-', 'A', '', 'C');    /* Ergebnis: 'A-C'  (leerer String ignoriert) */\nx = CATX('-', 'A', ., 'C');     /* Ergebnis: 'A--C' (numerisch missing bleibt!) */\n/* Loesung: MISSING() pruefen oder STRIP(PUT(.,.)) */\n```\n\n```python\n# PySpark: concat_ws ignoriert NULL automatisch\n# concat() gibt NULL zurueck wenn ANY argument NULL ist!\nfrom pyspark.sql import functions as F\n\n# Sicher: coalesce fuer NULL-Behandlung\ndf = df.withColumn(\"safe_concat\",\n    F.concat_ws(\"-\",\n        F.coalesce(F.col(\"feld1\"), F.lit(\"\")),\n        F.coalesce(F.col(\"feld2\"), F.lit(\"\"))\n    )\n)\n```",
      "exercise": {
        "description": "Erstelle aus den Feldern titel, vorname, nachname einen vollstaendigen Anzeigenamen. Wenn titel leer ist, nur vorname + nachname. Erstelle ausserdem eine normierte Adresse aus strasse, hausnr, plz, ort. Benutze in SAS CATX, in PySpark concat_ws.",
        "sasSolution": "DATA kunden_output;\n  SET kundenstamm;\n\n  /* Vollstaendiger Name mit optionalem Titel */\n  IF MISSING(titel) OR STRIP(titel) = '' THEN\n    anzeigename = CATX(' ', vorname, nachname);\n  ELSE\n    anzeigename = CATX(' ', titel, vorname, nachname);\n\n  /* Normierte Adresse */\n  strasse_nr   = CATX(' ', STRIP(strasse), STRIP(hausnr));\n  plz_ort      = CATX(' ', STRIP(plz), STRIP(ort));\n  adresse_norm = CATX(', ', strasse_nr, plz_ort);\n\n  KEEP kundennr anzeigename adresse_norm;\nRUN;\n\nPROC PRINT DATA=kunden_output (OBS=5) NOOBS;\n  TITLE 'Kunden mit normalisierten Feldern';\nRUN;",
        "pysparkSolution": "from pyspark.sql import functions as F\n\ndf = spark.table('kundenstamm')\n\ndf_out = df \\\n    .withColumn('anzeigename',\n        F.when(\n            F.col('titel').isNull() | (F.trim('titel') == ''),\n            F.concat_ws(' ', F.trim('vorname'), F.trim('nachname'))\n        ).otherwise(\n            F.concat_ws(' ', F.trim('titel'), F.trim('vorname'), F.trim('nachname'))\n        )\n    ) \\\n    .withColumn('strasse_nr', F.concat_ws(' ', F.trim('strasse'), F.trim('hausnr'))) \\\n    .withColumn('plz_ort',    F.concat_ws(' ', F.trim('plz'),    F.trim('ort'))) \\\n    .withColumn('adresse_norm', F.concat_ws(', ', 'strasse_nr', 'plz_ort')) \\\n    .select('kundennr', 'anzeigename', 'adresse_norm')\n\ndf_out.show(5, truncate=False)",
        "hints": [
          "CATX ignoriert leere Strings automatisch — kein IF noetig fuer Leerzeichen-Probleme",
          "In PySpark gibt concat() NULL zurueck wenn EIN Argument NULL ist — concat_ws() ist sicherer",
          "STRIP() vor CATX entfernt fuehrende und abschliessende Leerzeichen — wichtig bei SAP-Daten"
        ]
      }

      "id": "l14_3",
      "title": "PRXCHANGE: Regex-Ersetzungen & Bereinigung",
      "theory": "## PRXMATCH vs PRXCHANGE\n\nDu kennst PRXMATCH — es prueft OB ein Muster vorkommt. PRXCHANGE geht weiter: es **ersetzt** das Muster durch etwas anderes. Zusammen sind sie das Schweizer Taschenmesser fuer Textbereinigung.\n\n---\n\n## PRXCHANGE: Syntax und Grundlagen\n\n```sas\n/* PRXCHANGE(regex, count, string)\n   regex  = Perl-Regex als String (mit s/ fuer substitute)\n   count  = Anzahl Ersetzungen (-1 = alle, 1 = erste)\n   string = zu bearbeitender String\n*/\n\n/* Einfache Ersetzung: Bindestriche entfernen */\nDATA bereinigt;\n  SET kundenstamm;\n  /* Telefon: '0049-40-123456' -> '004940123456' */\n  telefon_norm = PRXCHANGE('s/-//g', -1, telefon);\nRUN;\n/* Erklaerung: s = substitute, /-/ = was ersetzen, // = womit, g = global */\n```\n\n---\n\n## Praxisbeispiele: Kundendaten bereinigen\n\n```sas\nDATA kunden_bereinigt;\n  SET sap.kundenstamm;\n\n  /* 1. Sonderzeichen aus Namen entfernen */\n  /* Erlaubt: Buchstaben, Umlaute, Leerzeichen, Bindestrich, Punkt */\n  name_clean = PRXCHANGE(\n    's/[^a-zA-ZaeoiAEOIss\\s\\-\\.]//g',\n    -1, STRIP(name)\n  );\n\n  /* 2. Mehrfache Leerzeichen zu einem zusammenfuehren */\n  name_clean = PRXCHANGE('s/\\s+/ /g', -1, name_clean);\n\n  /* 3. Telefonnummern normieren */\n  /* '+49 (0)40 123 456' -> '004940123456' */\n  tel_step1 = PRXCHANGE('s/\\+49/0049/g',   -1, telefon);\n  tel_step2 = PRXCHANGE('s/[\\s\\-\\(\\)]//g', -1, tel_step1);  /* Leerzeichen, Klammern */\n  telefon_norm = tel_step2;\n\n  /* 4. IBAN formatieren: DE12 3456 7890 -> DE123456789 */\n  iban_norm = PRXCHANGE('s/\\s//g', -1, UPCASE(iban));\n\n  /* 5. Zahlen aus Text extrahieren -> nur Ziffern behalten */\n  nur_ziffern = PRXCHANGE('s/[^0-9]//g', -1, rohwert);\n\n  /* 6. Email zu Kleinbuchstaben + Leerzeichen entfernen */\n  email_norm = LOWCASE(PRXCHANGE('s/\\s//g', -1, email));\nRUN;\n```\n\n---\n\n## Mehrfache Patterns mit PRXPARSE (effizienter)\n\n```sas\n/* Wenn PRXCHANGE in einer Schleife laeuft: Pattern vorcompilieren */\nDATA telefon_norm;\n  SET kundenstamm;\n\n  /* Pattern einmal kompilieren */\n  IF _N_ = 1 THEN DO;\n    re_plus49 = PRXPARSE('s/^\\+49/0049/');\n    re_spaces = PRXPARSE('s/[\\s\\-\\(\\)]//g');\n    RETAIN re_plus49 re_spaces;\n  END;\n\n  /* Pattern wiederverwenden (keine Re-Kompilierung) */\n  tel = PRXCHANGE(re_plus49, 1, telefon);\n  tel = PRXCHANGE(re_spaces, -1, tel);\n  telefon_norm = tel;\n\n  DROP re_plus49 re_spaces;\nRUN;\n```\n\n---\n\n## PySpark: regexp_replace\n\n```python\nfrom pyspark.sql import functions as F\n\ndf = spark.table(\"sap.kundenstamm\")\n\ndf_bereinigt = df     .withColumn(\"name_clean\",\n        # Sonderzeichen entfernen\n        F.regexp_replace(\"name\", r\"[^a-zA-ZaeoiAEOIss\\s\\-\\.]\", \"\")\n    )     .withColumn(\"name_clean\",\n        # Mehrfache Leerzeichen zusammenfuehren\n        F.regexp_replace(F.trim(\"name_clean\"), r\"\\s+\", \" \")\n    )     .withColumn(\"telefon_norm\",\n        # +49 -> 0049, dann alle Leerzeichen/Klammern/Bindestriche entfernen\n        F.regexp_replace(\n            F.regexp_replace(\"telefon\", r\"^\\+49\", \"0049\"),\n            r\"[\\s\\-\\(\\)]\", \"\"\n        )\n    )     .withColumn(\"iban_norm\",\n        # Leerzeichen aus IBAN entfernen, Grossbuchstaben\n        F.regexp_replace(F.upper(\"iban\"), r\"\\s\", \"\")\n    )     .withColumn(\"email_norm\",\n        # Kleinbuchstaben + keine Leerzeichen\n        F.lower(F.regexp_replace(\"email\", r\"\\s\", \"\"))\n    )\n\n# Extraktions-Pattern: erste Zahl aus Text extrahieren\ndf_bereinigt = df_bereinigt.withColumn(\n    \"erste_zahl\",\n    F.regexp_extract(\"rohwert\", r\"(\\d+)\", 1)   # Gruppe 1\n)\n```\n\n---\n\n## Regex-Referenz fuer Datenbereinigung\n\n| Pattern | Bedeutet | Beispiel |\n|---------|----------|---------|\n| `\\s` | Leerzeichen/Tab/Newline | `s/\\s//g` -> alle Spaces entfernen |\n| `\\d` | Ziffer 0-9 | `s/\\D//g` -> nur Ziffern behalten |\n| `\\w` | Buchstabe/Ziffer/_ | `[^\\w]` -> Sonderzeichen |\n| `^` | Anfang des Strings | `s/^\\s+//` -> fuehrende Spaces |\n| `$` | Ende des Strings | `s/\\s+$//` -> abschliessende Spaces |\n| `+` | 1 oder mehr | `\\s+` -> ein oder mehr Spaces |\n| `*` | 0 oder mehr | `\\s*` -> optional |\n| `[]` | Zeichenklasse | `[aeiou]` -> Vokale |\n| `[^]` | Nicht in Klasse | `[^0-9]` -> keine Ziffern |",
      "exercise": {
        "description": "Bereinige Telefonnummern in einer Kundentabelle: 1) Ersetze +49 durch 0049 am Anfang, 2) Entferne alle Leerzeichen, Bindestriche und Klammern, 3) Prueffe das Ergebnis (nur Ziffern, Laenge 10-12). Nutze PRXCHANGE in SAS, regexp_replace in PySpark.",
        "sasSolution": "DATA telefon_clean;\n  SET kundenstamm;\n\n  /* Schritt 1: +49 am Anfang ersetzen */\n  tel = PRXCHANGE('s/^\\+49/0049/', 1, STRIP(telefon));\n\n  /* Schritt 2: Leerzeichen, Bindestriche, Klammern entfernen */\n  tel = PRXCHANGE('s/[\\s\\-\\(\\)]//g', -1, tel);\n\n  /* Schritt 3: Validierung */\n  tel_nur_ziffern = (PRXMATCH('/^\\d+$/', tel) > 0);\n  tel_laenge_ok   = (LENGTH(tel) BETWEEN 10 AND 12);\n  tel_valid       = (tel_nur_ziffern AND tel_laenge_ok);\n\n  RENAME tel = telefon_norm;\nRUN;\n\nPROC FREQ DATA=telefon_clean;\n  TABLES tel_valid;\n  TITLE 'Telefon-Validierung nach Bereinigung';\nRUN;",
        "pysparkSolution": "from pyspark.sql import functions as F\n\ndf = spark.table('kundenstamm')\n\ndf_clean = df \\\n    .withColumn('tel',\n        F.regexp_replace(F.trim('telefon'), r'^\\+49', '0049')\n    ) \\\n    .withColumn('telefon_norm',\n        F.regexp_replace('tel', r'[\\s\\-\\(\\)]', '')\n    ) \\\n    .withColumn('tel_nur_ziffern',\n        F.col('telefon_norm').rlike(r'^\\d+$')\n    ) \\\n    .withColumn('tel_laenge_ok',\n        F.length('telefon_norm').between(10, 12)\n    ) \\\n    .withColumn('tel_valid',\n        F.col('tel_nur_ziffern') & F.col('tel_laenge_ok')\n    ) \\\n    .drop('tel')\n\ndf_clean.groupBy('tel_valid').count().show()\ndf_clean.select('telefon', 'telefon_norm', 'tel_valid').show(10)",
        "hints": [
          "In SAS muss + im Regex escaped werden: \\+ (sonst bedeutet es '1 oder mehr')",
          "^ am Anfang des Patterns bedeutet 'Anfang des Strings' — s/^\\+49/ ersetzt NUR am Anfang",
          "rlike() in PySpark ist wie PRXMATCH in SAS — es prueft NUR ob das Muster vorkommt"
        ]
      }
    }

        theory: "## Warum Datum so trickreich ist\n\nIn SAS sind Datumswerte intern **Zahlen** (Tage seit 01.01.1960). Ein Format wie `DATE9.` ist nur die Anzeigemaske. In Databricks/Spark SQL sind Daten echte `DATE`-Typen — Format-Strings folgen Java-Konventionen.\n\n---\n\n## SAS: Datumsformate im Überblick\n\n```sas\nDATA datum_beispiele;\n  heute = TODAY();            /* numerischer Wert z.B. 23446 */\n  jetzt = DATETIME();         /* Sekunden seit 01.01.1960    */\n\n  /* Ausgabeformate */\n  FORMAT heute  DATE9.;       /* 11MAR2026        */\n  FORMAT heute  DDMMYY10.;   /* 11/03/2026       */\n  FORMAT heute  YYMMDD10.;   /* 2026-03-11       */\n  FORMAT heute  MONYY7.;     /* MAR2026          */\n  FORMAT jetzt  DATETIME26.6;/* 11MAR2026:14:30  */\n\n  /* Datum aus String einlesen */\n  d1 = INPUT('11MAR2026',   DATE9.);    /* -> SAS-Datum */\n  d2 = INPUT('2026-03-11',  YYMMDD10.);\n  d3 = INPUT('11/03/2026',  DDMMYY10.);\n  FORMAT d1 d2 d3 DATE9.;\n\n  /* Datum-Literal im Code */\n  vertrags_start = '01JAN2024'd;   /* d-Suffix = Datum-Literal */\nRUN;\n```\n\n---\n\n## SAS: Datumsberechnungen\n\n```sas\nDATA berechnungen;\n  heute = TODAY();\n\n  /* Differenz */\n  tage_diff = '31DEC2026'd - heute;\n  monate    = INTCK('MONTH', heute, '31DEC2026'd);\n  jahre     = INTCK('YEAR',  heute, '31DEC2026'd);\n\n  /* Datum manipulieren */\n  naechster_monat = INTNX('MONTH', heute, 1);          /* +1 Monat, Anfang */\n  monatsende      = INTNX('MONTH', heute, 0, 'END');   /* Ende dieses Monats */\n  jahresende      = INTNX('YEAR',  heute, 0, 'END');   /* 31.12. */\n  in_90_tagen     = heute + 90;                         /* einfache Addition */\n\n  /* Teile extrahieren */\n  tag       = DAY(heute);\n  monat_nr  = MONTH(heute);\n  jahr      = YEAR(heute);\n  quartal   = QTR(heute);\n  wochentag = WEEKDAY(heute);   /* 1=Sonntag, 2=Montag ... */\n\n  FORMAT heute naechster_monat monatsende jahresende DDMMYY10.;\nRUN;\n```\n\n---\n\n## Databricks SQL: Datumsformate\n\n```sas\n-- In Databricks/Spark SQL sind Daten echte DATE-Typen\n\n-- Aktuelles Datum\nSELECT CURRENT_DATE, CURRENT_TIMESTAMP;\n\n-- Datum aus String (Java SimpleDateFormat)\nSELECT TO_DATE('2026-03-11', 'yyyy-MM-dd')         AS d1,\n       TO_DATE('11/03/2026', 'dd/MM/yyyy')         AS d2,\n       TO_TIMESTAMP('2026-03-11 14:30:00',\n                    'yyyy-MM-dd HH:mm:ss')         AS ts1;\n\n-- Format-String Referenz:\n-- yyyy = Jahr (2026)   MM = Monat (03)   dd = Tag (11)\n-- HH   = Stunde 24h    mm = Minute       ss = Sekunde\n\n-- Datum formatieren\nSELECT DATE_FORMAT(CURRENT_DATE, 'dd.MM.yyyy')  AS deutsch,\n       DATE_FORMAT(CURRENT_DATE, 'yyyy-MM-dd')  AS iso;\n```\n\n---\n\n## Databricks SQL: Datumsberechnungen\n\n```sas\n-- Differenz\nSELECT DATEDIFF(DATE'2026-12-31', CURRENT_DATE)    AS tage_bis_jahresende,\n       MONTHS_BETWEEN(DATE'2026-12-31', CURRENT_DATE) AS monate;\n\n-- Datum manipulieren\nSELECT DATE_ADD(CURRENT_DATE, 90)                  AS in_90_tagen,\n       ADD_MONTHS(CURRENT_DATE, 1)                 AS naechster_monat,\n       LAST_DAY(CURRENT_DATE)                      AS monatsende,\n       DATE_TRUNC('MONTH', CURRENT_DATE)           AS monatsanfang,\n       DATE_TRUNC('YEAR',  CURRENT_DATE)           AS jahresanfang;\n\n-- Teile extrahieren\nSELECT DAY(CURRENT_DATE)        AS tag,\n       MONTH(CURRENT_DATE)      AS monat,\n       YEAR(CURRENT_DATE)       AS jahr,\n       QUARTER(CURRENT_DATE)    AS quartal,\n       WEEKOFYEAR(CURRENT_DATE) AS kalenderwoche;\n```\n\n---\n\n## Vergleich: SAS vs. Databricks\n\n| Aufgabe | SAS | Databricks SQL |\n|---------|-----|----------------|\n| Heute | `TODAY()` | `CURRENT_DATE` |\n| Jetzt | `DATETIME()` | `CURRENT_TIMESTAMP` |\n| Differenz (Tage) | `date2 - date1` | `DATEDIFF(d2, d1)` |\n| Differenz (Monate) | `INTCK('MONTH', d1, d2)` | `MONTHS_BETWEEN(d2, d1)` |\n| +N Tage | `datum + 90` | `DATE_ADD(datum, 90)` |\n| +N Monate | `INTNX('MONTH', d, n)` | `ADD_MONTHS(datum, n)` |\n| Monatsende | `INTNX('MONTH', d, 0, 'END')` | `LAST_DAY(datum)` |\n| Jahr extrahieren | `YEAR(datum)` | `YEAR(datum)` |\n| String → Datum | `INPUT(str, DATE9.)` | `TO_DATE(str, 'format')` |\n| Datum → String | `PUT(datum, DATE9.)` | `DATE_FORMAT(datum, 'format')` |",
        exercise: {
          description: "Berechne fuer einen Vertragsdatensatz: 1) Tage bis Vertragsende, 2) Quartal des Vertragsbeginns, 3) Monatsende des Vertragsbeginns. Einmal in SAS, einmal in Databricks SQL.",
          sasSolution: "DATA vertrags_analyse;\n  SET vertraege;\n\n  heute = TODAY();\n\n  /* 1. Tage bis Vertragsende */\n  tage_bis_ende = vertrag_ende - heute;\n\n  /* 2. Quartal des Vertragsbeginns */\n  quartal_start = QTR(vertrag_start);\n  jahr_start    = YEAR(vertrag_start);\n  quartal_label = CATS('Q', quartal_start, '/', jahr_start);\n\n  /* 3. Monatsende des Vertragsbeginns */\n  monatsende_start = INTNX('MONTH', vertrag_start, 0, 'END');\n\n  FORMAT heute vertrag_start vertrag_ende\n         monatsende_start DDMMYY10.;\n\n  WHERE tage_bis_ende > 0;\nRUN;\n\nPROC PRINT DATA=vertrags_analyse (OBS=10) NOOBS;\n  TITLE 'Vertragsanalyse';\nRUN;",
          pysparkSolution: "-- Databricks SQL\nSELECT\n  vertragsnr,\n  vertrag_start,\n  vertrag_ende,\n\n  -- 1. Tage bis Vertragsende\n  DATEDIFF(vertrag_ende, CURRENT_DATE)          AS tage_bis_ende,\n\n  -- 2. Quartal des Vertragsbeginns\n  QUARTER(vertrag_start)                        AS quartal_start,\n  CONCAT('Q', QUARTER(vertrag_start), '/',\n         YEAR(vertrag_start))                   AS quartal_label,\n\n  -- 3. Monatsende des Vertragsbeginns\n  LAST_DAY(vertrag_start)                       AS monatsende_start\n\nFROM vertraege\nWHERE DATEDIFF(vertrag_ende, CURRENT_DATE) > 0\nORDER BY tage_bis_ende ASC;",

          ]
        }

        title: "SQL-Dialekte: Was SAS nicht kann",
        theory: "## SAS SQL vs. Spark SQL — der wichtigste Migrationsweg\n\nViele Kolleg:innen schreiben in SAS hauptsaechlich **PROC SQL** — und in Databricks ebenfalls **SQL**. Der Wechsel von PROC SQL zu Spark SQL ist der haeufigste Migrationspfad.\n\n**Die gute Nachricht:** SELECT, JOIN, GROUP BY, HAVING, ORDER BY — identisch.\n**Die schlechte Nachricht:** Genau die Unterschiede erwischen einen.\n\n---\n\n## Was in beiden gleich ist\n\n```sas\n/* PROC SQL -- SAS */\nPROC SQL;\n  SELECT k.kundennr, k.name,\n         COUNT(v.vertragsnr)    AS anzahl_vertraege,\n         SUM(v.jahresverbrauch) AS gesamtverbrauch\n  FROM kunden k\n  LEFT JOIN vertraege v ON k.kundennr = v.kundennr\n  WHERE k.status = 'AKTIV'\n  GROUP BY k.kundennr, k.name\n  HAVING COUNT(v.vertragsnr) > 1\n  ORDER BY gesamtverbrauch DESC;\nQUIT;\n```\n\n```sas\n-- Spark SQL (Databricks) -- fast identisch!\nSELECT k.kundennr, k.name,\n       COUNT(v.vertragsnr)    AS anzahl_vertraege,\n       SUM(v.jahresverbrauch) AS gesamtverbrauch\nFROM kunden k\nLEFT JOIN vertraege v ON k.kundennr = v.kundennr\nWHERE k.status = 'AKTIV'\nGROUP BY k.kundennr, k.name\nHAVING COUNT(v.vertragsnr) > 1\nORDER BY gesamtverbrauch DESC;\n```\n\n---\n\n## Window Functions: SAS kann sie nicht, Spark schon\n\n```sas\n/* SAS PROC SQL: Window Functions NICHT unterstuetzt */\nPROC SQL;\n  SELECT kundennr, verbrauch,\n    LAG(verbrauch) OVER (PARTITION BY kundennr\n                        ORDER BY datum) AS vormonat   /* FEHLER in SAS! */\n  FROM verbrauch;\nQUIT;\n\n/* SAS-Workaround: DATA Step mit RETAIN */\nPROC SORT DATA=verbrauch; BY kundennr datum; RUN;\nDATA verbrauch_lag;\n  SET verbrauch;\n  BY kundennr;\n  vormonat = LAG(verbrauch_kwh);\n  IF FIRST.kundennr THEN vormonat = .;  /* Reset je Kunde */\nRUN;\n```\n\n```sas\n-- Spark SQL: Window Functions nativ\nSELECT\n  kundennr, datum, verbrauch_kwh,\n  LAG(verbrauch_kwh)  OVER (PARTITION BY kundennr ORDER BY datum) AS vormonat,\n  LEAD(verbrauch_kwh) OVER (PARTITION BY kundennr ORDER BY datum) AS naechster,\n  AVG(verbrauch_kwh)  OVER (PARTITION BY kundennr\n                            ORDER BY datum\n                            ROWS BETWEEN 2 PRECEDING AND CURRENT ROW) AS avg_3m,\n  RANK() OVER (PARTITION BY tarif ORDER BY verbrauch_kwh DESC)        AS rang,\n  SUM(verbrauch_kwh)  OVER (PARTITION BY kundennr\n                            ORDER BY datum\n                            ROWS UNBOUNDED PRECEDING)                 AS kumuliert\nFROM verbrauch;\n```\n\n---\n\n## LEFT SEMI JOIN: effizienter als EXISTS\n\n```sas\n/* SAS PROC SQL: kein SEMI JOIN -- EXISTS/IN als Workaround */\nPROC SQL;\n  SELECT k.*\n  FROM kunden k\n  WHERE EXISTS (\n    SELECT 1 FROM vertraege v WHERE v.kundennr = k.kundennr\n  );\nQUIT;\n```\n\n```sas\n-- Spark SQL: LEFT SEMI JOIN -- kein Duplikat-Problem!\nSELECT k.*\nFROM kunden k\nLEFT SEMI JOIN vertraege v ON k.kundennr = v.kundennr;\n\n-- LEFT ANTI JOIN: Kunden OHNE Vertrag\nSELECT k.*\nFROM kunden k\nLEFT ANTI JOIN vertraege v ON k.kundennr = v.kundennr;\n```\n\n---\n\n## String-Funktionen: kleine Unterschiede\n\n```sas\n/* SAS PROC SQL */\nSELECT UPCASE(name),\n       SUBSTR(name, 1, 10),\n       TRIM(name),\n       COMPRESS(name, ' '),\n       INDEX(name, 'GmbH') AS pos_gmbh\nFROM kunden;\n```\n\n```sas\n-- Spark SQL\nSELECT UPPER(name),\n       SUBSTRING(name, 1, 10),    -- SUBSTR funktioniert auch\n       TRIM(name),\n       REPLACE(name, ' ', ''),    -- kein COMPRESS in Spark\n       INSTR(name, 'GmbH') AS pos_gmbh\nFROM kunden;\n```\n\n---\n\n## Vergleichstabelle: SAS PROC SQL vs. Spark SQL\n\n| Feature | SAS PROC SQL | Spark SQL |\n|---------|-------------|----------|\n| Window Functions | ❌ nicht unterstuetzt | ✅ voll |\n| LAG / LEAD | ❌ nur per DATA Step | ✅ nativ |\n| LEFT SEMI JOIN | ❌ | ✅ |\n| LEFT ANTI JOIN | ❌ | ✅ |\n| CTEs (WITH ...) | ✅ | ✅ |\n| UNION / INTERSECT | ✅ | ✅ |\n| PIVOT | teilweise | ✅ |\n| REGEXP in WHERE | PRXMATCH | RLIKE |\n| SUBSTR | ✅ | ✅ (auch SUBSTRING) |\n| COMPRESS | ✅ | ❌ (REPLACE verwenden) |",
        exercise: {
          description: "Schreibe eine Query: pro Kunde und Monat den Verbrauch, den Vormonat (LAG) und einen rollenden 3-Monats-Schnitt. In SAS als DATA Step Workaround, in Databricks direkt mit Window Functions.",
          sasSolution: "/* SAS: Window Functions via DATA Step simulieren */\n\nPROC SORT DATA=verbrauch OUT=v_sort;\n  BY kundennr jahr monat;\nRUN;\n\nDATA verbrauch_analyse;\n  SET v_sort;\n  BY kundennr;\n\n  /* LAG -- Vormonat */\n  vormonat_kwh = LAG(verbrauch_kwh);\n  IF FIRST.kundennr THEN vormonat_kwh = .;\n\n  /* Rollender 3-Monats-Schnitt via ARRAY+RETAIN */\n  ARRAY hist[3] h1 h2 h3;\n  RETAIN h1 h2 h3;\n  IF FIRST.kundennr THEN DO; h1=.; h2=.; h3=.; END;\n  h3 = h2;  h2 = h1;  h1 = verbrauch_kwh;\n  IF NOT MISSING(h3) THEN avg_3m = MEAN(h1, h2, h3);\n  ELSE avg_3m = .;\n\nRUN;\n\nPROC PRINT DATA=verbrauch_analyse (OBS=15) NOOBS;\n  VAR kundennr jahr monat verbrauch_kwh vormonat_kwh avg_3m;\nRUN;",
          pysparkSolution: "-- Databricks SQL: direkt mit Window Functions\nSELECT\n  kundennr, jahr, monat, verbrauch_kwh,\n\n  LAG(verbrauch_kwh)\n    OVER (PARTITION BY kundennr\n          ORDER BY jahr, monat)           AS vormonat_kwh,\n\n  verbrauch_kwh - LAG(verbrauch_kwh)\n    OVER (PARTITION BY kundennr\n          ORDER BY jahr, monat)           AS delta_vormonat,\n\n  AVG(verbrauch_kwh)\n    OVER (PARTITION BY kundennr\n          ORDER BY jahr, monat\n          ROWS BETWEEN 2 PRECEDING\n               AND CURRENT ROW)          AS avg_3monate,\n\n  RANK()\n    OVER (PARTITION BY tarif\n          ORDER BY verbrauch_kwh DESC)    AS rang_im_tarif\n\nFROM verbrauch\nORDER BY kundennr, jahr, monat;",
          hints: [
            "In SAS braucht LAG() immer vorher PROC SORT und BY-Variable -- sonst falsche Ergebnisse",
            "FIRST.kundennr setzt den LAG-Wert auf missing -- sonst wird der letzte Wert des VORHERIGEN Kunden verwendet",
            "In Spark SQL: ROWS BETWEEN 2 PRECEDING AND CURRENT ROW = aktuelle Zeile + 2 davor = 3 Zeilen"

        id: "l16_2",
        title: "Migration: SAS-Logiken nach Spark SQL",
        theory: "## Der Migrations-Leitfaden\n\nDer haeufigste Migrationspfad bei Vattenfall:\n**PROC SQL → Spark SQL** (fast 1:1)\n**DATA Step mit BY → Window Functions** (grosse Vereinfachung)\n**Makros → Python-Funktionen** (mehr Flexibilitaet)\n\n---\n\n## Pattern 1: PROC SQL → Spark SQL\n\n```sas\n/* SAS Original */\nPROC SQL;\n  CREATE TABLE kunden_aktiv AS\n  SELECT k.kundennr, k.name, k.tarif,\n         COUNT(v.vertragsnr) AS anzahl_vertraege\n  FROM dwh.kunden k\n  INNER JOIN dwh.vertraege v ON k.kundennr = v.kundennr\n  WHERE k.status = 'AKTIV' AND k.land = 'DE'\n  GROUP BY k.kundennr, k.name, k.tarif\n  HAVING COUNT(v.vertragsnr) >= 1\n  ORDER BY anzahl_vertraege DESC;\nQUIT;\n```\n\n```sas\n-- Spark SQL: fast identisch\nCREATE OR REPLACE TABLE kunden_aktiv AS\nSELECT k.kundennr, k.name, k.tarif,\n       COUNT(v.vertragsnr) AS anzahl_vertraege\nFROM catalog.schema.kunden k\nINNER JOIN catalog.schema.vertraege v ON k.kundennr = v.kundennr\nWHERE k.status = 'AKTIV' AND k.land = 'DE'\nGROUP BY k.kundennr, k.name, k.tarif\nHAVING COUNT(v.vertragsnr) >= 1\nORDER BY anzahl_vertraege DESC;\n```\n\n---\n\n## Pattern 2: FIRST./LAST. → ROW_NUMBER()\n\n```sas\n/* SAS: Neuesten Vertrag je Kunde finden */\nPROC SORT DATA=vertraege; BY kundennr gueltig_ab; RUN;\nDATA akt_vertrag;\n  SET vertraege;\n  BY kundennr;\n  IF LAST.kundennr;   /* nur letzter Datensatz je Kunde */\nRUN;\n```\n\n```sas\n-- Spark SQL: ROW_NUMBER() statt LAST.\nSELECT * FROM (\n  SELECT *,\n    ROW_NUMBER() OVER (\n      PARTITION BY kundennr\n      ORDER BY gueltig_ab DESC\n    ) AS rn\n  FROM vertraege\n)\nWHERE rn = 1;\n```\n\n---\n\n## Pattern 3: RETAIN → SUM OVER\n\n```sas\n/* SAS: Kumulierter Verbrauch mit RETAIN */\nPROC SORT DATA=verbrauch; BY kundennr datum; RUN;\nDATA kumuliert;\n  SET verbrauch;\n  BY kundennr;\n  RETAIN kum_verbrauch 0;\n  IF FIRST.kundennr THEN kum_verbrauch = 0;\n  kum_verbrauch + verbrauch_kwh;\nRUN;\n```\n\n```sas\n-- Spark SQL: viel einfacher!\nSELECT\n  kundennr, datum, verbrauch_kwh,\n  SUM(verbrauch_kwh) OVER (\n    PARTITION BY kundennr\n    ORDER BY datum\n    ROWS UNBOUNDED PRECEDING\n  ) AS kum_verbrauch\nFROM verbrauch;\n```\n\n---\n\n## Pattern 4: SAS-Makro → Python-Funktion\n\n```sas\n/* SAS Makro */\n%MACRO region_report(region=, jahr=);\n  PROC SQL;\n    SELECT region, COUNT(*) AS kunden, SUM(umsatz) AS umsatz_ges\n    FROM dwh.kunden\n    WHERE region = \"&region\" AND YEAR(vertrag_start) = &jahr\n    GROUP BY region;\n  QUIT;\n%MEND;\n%region_report(region=NORD, jahr=2025)\n```\n\n```python\n# Databricks Python\ndef region_report(region: str, jahr: int):\n    return spark.sql(f\"\"\"\n        SELECT region,\n               COUNT(*)    AS kunden,\n               SUM(umsatz) AS umsatz_ges\n        FROM catalog.schema.kunden\n        WHERE region = '{region}'\n          AND YEAR(vertrag_start) = {jahr}\n        GROUP BY region\n    \"\"\")\n\ndisplay(region_report('NORD', 2025))\n```\n\n---\n\n## Migrations-Checkliste\n\n| SAS-Konstrukt | Spark SQL / Databricks | Aufwand |\n|---------------|------------------------|--------|\n| `PROC SQL` | SQL-Zelle | 🟢 Klein |\n| `LIBNAME ODBC` | `spark.read.jdbc(...)` | 🟡 Mittel |\n| `%MACRO / %MEND` | Python-Funktion | 🟡 Mittel |\n| `FIRST. / LAST.` | `ROW_NUMBER() OVER (...)` | 🟡 Mittel |\n| `RETAIN` kumuliert | `SUM() OVER (ROWS UNBOUNDED PRECEDING)` | 🟢 Klein |\n| `LAG()` im DATA Step | `LAG() OVER (PARTITION BY ...)` | 🟢 Klein |\n| `MERGE ... BY` | `JOIN` oder `MERGE INTO` | 🟡 Mittel |\n| `ODS PDF` | Databricks Dashboards | 🔴 Grösser |",
        exercise: {
          description: "Migriere folgende SAS-Logik nach Spark SQL: Neuesten Vertrag je Kunde finden (LAST.), kumulative Verbrauchssumme berechnen, nur Kunden mit mehr als 1000 kWh behalten.",
          sasSolution: "/* SAS Original */\n\nPROC SORT DATA=vertraege; BY kundennr gueltig_ab; RUN;\nDATA akt_vertrag;\n  SET vertraege;\n  BY kundennr;\n  IF LAST.kundennr;\nRUN;\n\nPROC SORT DATA=verbrauch; BY kundennr datum; RUN;\nDATA verbrauch_kum;\n  SET verbrauch;\n  BY kundennr;\n  RETAIN kum 0;\n  IF FIRST.kundennr THEN kum = 0;\n  kum + verbrauch_kwh;\nRUN;\n\nDATA ergebnis;\n  MERGE akt_vertrag (IN=a) verbrauch_kum (IN=b);\n  BY kundennr;\n  IF a AND b AND kum > 1000;\nRUN;",
          pysparkSolution: "-- Spark SQL: Alles in einer Query mit CTEs\nWITH akt_vertrag AS (\n  SELECT * FROM (\n    SELECT *,\n      ROW_NUMBER() OVER (\n        PARTITION BY kundennr\n        ORDER BY gueltig_ab DESC\n      ) AS rn\n    FROM vertraege\n  )\n  WHERE rn = 1\n),\nverbrauch_kum AS (\n  SELECT kundennr,\n    MAX(SUM(verbrauch_kwh) OVER (\n      PARTITION BY kundennr\n      ORDER BY datum\n      ROWS UNBOUNDED PRECEDING\n    )) AS gesamtverbrauch\n  FROM verbrauch\n  GROUP BY kundennr\n)\nSELECT v.kundennr, v.tarif, v.gueltig_ab, k.gesamtverbrauch\nFROM akt_vertrag v\nINNER JOIN verbrauch_kum k ON v.kundennr = k.kundennr\nWHERE k.gesamtverbrauch > 1000\nORDER BY k.gesamtverbrauch DESC;",
          hints: [
            "SAS LAST. = Spark ROW_NUMBER() OVER (...ORDER BY datum DESC) WHERE rn = 1",
            "SAS RETAIN + kum + verbrauch = Spark SUM() OVER (ROWS UNBOUNDED PRECEDING)",

  <!-- Block 2: Pure JS helper functions (markdownToHTML, escapeHtml) -->
  <script>

// ── MARKDOWN → HTML ───────────────────────────────────────────────────────────
function markdownToHTML(md) {
  if (!md) return "";
  let html = md
    .replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
      const prismLang = lang === "sas" ? "sas" : lang === "python" ? "python" : lang || "none";
      const cls = prismLang !== "none" ? ` class="language-${prismLang}"` : "";
      return `<pre class="language-${prismLang}"><code${cls}>${escapeHtml(code.trim())}</code></pre>`;
    })
    .replace(/`([^`]+)`/g, `<code style="background:#0f172a;color:#00ff88;padding:2px 6px;border-radius:4px;font-size:13px">$1</code>`)
    .replace(/^## (.+)$/gm, (_, t) => {
      const tl = t.trim().toLowerCase();
      const lang = tl.startsWith('sas') ? 'sas' : (tl.startsWith('pyspark') || tl.startsWith('python')) ? 'python' : '';
      return `<h2 style="color:#00ccff;font-size:17px;font-weight:700;margin:28px 0 12px;border-bottom:1px solid #1e293b;padding-bottom:8px;letter-spacing:1px"${lang ? ` data-lang="${lang}"` : ''}>${t}</h2>`;
    })
    .replace(/^### (.+)$/gm, (_, t) => {
      const tl = t.trim().toLowerCase();
      const lang = tl.startsWith('sas') ? 'sas' : (tl.startsWith('pyspark') || tl.startsWith('python')) ? 'python' : '';
      return `<h3 style="color:#7dd3fc;font-size:14px;font-weight:700;margin:20px 0 8px;letter-spacing:1px"${lang ? ` data-lang="${lang}"` : ''}>${t}</h3>`;
    })
    .replace(/\*\*([^*]+)\*\*/g, `<strong style="color:#f0abfc;font-weight:700">$1</strong>`)
    .replace(/\*([^*]+)\*/g, `<em style="color:#fbbf24">$1</em>`)
    .replace(/^---$/gm, `<hr style="border:none;border-top:1px solid #1e293b;margin:24px 0">`)
    .replace(/^\| (.+) \|$/gm, (line) => {
      const cells = line.split("|").filter(Boolean).map(c => c.trim());
      return `<tr>${cells.map(c =>
        c.match(/^[-:]+$/) ? "" : `<td style="padding:8px 12px;border:1px solid #1e293b;font-size:13px">${c}</td>`
      ).join("")}</tr>`;
    })
    .replace(/^- (.+)$/gm, `<li style="color:#94a3b8;margin:4px 0;font-size:14px">$1</li>`)
    .replace(/\n\n/g, `</p>|||BREAK|||<p style="color:#94a3b8;font-size:14px;line-height:1.8;margin:12px 0">`);

  html = html.replace(/(<tr>[\s\S]*?<\/tr>)+/g, match =>
    `<table style="border-collapse:collapse;width:100%;margin:16px 0">${match}</table>`
  );
  html = html.replace(/(<li[^>]*>[\s\S]*?<\/li>)+/g, match =>
    `<ul style="padding-left:20px;margin:12px 0">${match}</ul>`
  );

  // Pull h2/h3 out of <p> wrappers so they are standalone block elements
  html = html.replace(/(<p[^>]*>)([^<]*(<h[23][^>]*>.*?<\/h[23]>)[^<]*)<\/p>/gs,
    (_, ptag, content, heading) => content.trim() === heading.trim() ? heading : ptag + content + "</p>"
  );
  html = html.replace(/\|\|\|BREAK\|\|\|/g, "");
  return `<div>${html}</div>`;
}

function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

  <!-- Block 2b: Custom SAS syntax mode for CodeMirror (uses defineMode - no addon needed) -->
  <script>
  (function() {
    var SAS_KEYWORDS = /^(DATA|PROC|RUN|QUIT|SET|MERGE|BY|IF|THEN|ELSE|DO|END|OUTPUT|KEEP|DROP|RENAME|WHERE|INPUT|CARDS|DATALINES|FORMAT|INFORMAT|LENGTH|LABEL|ATTRIB|ARRAY|RETAIN|CALL|PUT|FILE|INFILE|FILENAME|LIBNAME|OPTIONS|TITLE|FOOTNOTE|ODS|CLASS|VAR|MODEL|TABLES|WEIGHT|FREQ|MEANS|SORT|PRINT|CONTENTS|DATASETS|IMPORT|EXPORT|SQL|SELECT|FROM|INTO|LEFT|INNER|OUTER|JOIN|ON|GROUP|ORDER|HAVING|AS|CASE|WHEN|COALESCE|COUNT|SUM|AVG|MIN|MAX|DISTINCT|NOT|AND|OR|IN|BETWEEN|LIKE|IS|NULL|MISSING|NE|EQ|LE|GE|LT|GT|UPDATE|INSERT|DELETE|CREATE|DROP|TABLE|VIEW|INDEX|INTNX|INTCK|OUT|NOOBS|NODUPKEY|DUPKEY|DESCENDING|ASCENDING|NODUPS)$/i;

    var SAS_BUILTINS = /^(UPCASE|LOWCASE|TRIM|STRIP|COMPRESS|COMPBL|SUBSTR|INDEX|SCAN|TRANWRD|TRANSLATE|CAT|CATS|CATT|CATX|INT|ROUND|FLOOR|CEIL|ABS|SQRT|LOG|LOG2|LOG10|EXP|MOD|RANK|CHAR|BYTE|ANYALPHA|ANYDIGIT|ANYPUNCT|ANYSPACE|DATE|TODAY|DATETIME|MDY|DMY|DATEPART|TIMEPART|YEAR|MONTH|DAY|QTR|WEEK|DATDIF|YRDIF|PRXMATCH|PRXPARSE|PRXCHANGE|PRXFREE|PRXPOSN|PRXNEXT|PRXSUBSTR|NOBS|SYMGET|SYMPUT|SYMPUTX|SYSFUNC|SYSEVALF|OPEN|CLOSE|ATTRN|VARNUM|VARNAME|IFC|IFN|COALESCE|COALESCEC|MISSING|NMISS|CMISS|LARGEST|SMALLEST|RANGE|STD|VAR|STDERR|KURTOSIS|SKEWNESS|GEOMEAN|HARMEAN|CSSQ|USSQ|SS|SUMWGT|T|PROBT)$/i;

    CodeMirror.defineMode("sas", function() {
      return {
        startState: function() {
          return { inComment: false, inString: false, stringChar: null };
        },
        token: function(stream, state) {
          // Multi-line comment
          if (state.inComment) {
            if (stream.match(/.*?\*\//)) { state.inComment = false; return "comment"; }
            stream.skipToEnd();
            return "comment";
          }

          // Whitespace
          if (stream.eatSpace()) return null;

          // Start of block comment
          if (stream.match("/*")) { state.inComment = true; return "comment"; }

          // Single-line comment (*)
          if (stream.sol() && stream.peek() === "*") {
            stream.skipToEnd(); return "comment";
          }

          // Strings
          var ch = stream.peek();
          if (ch === '"' || ch === "'") {
            stream.next();
            while (!stream.eol()) {
              var c = stream.next();
              if (c === ch) break;
            }
            return "string";
          }

          // Macro: %keyword or &var
          if (ch === "%") { stream.next(); stream.eatWhile(/\w/); return "variable-2"; }
          if (ch === "&") { stream.next(); stream.eatWhile(/[\w\.]/); return "variable-2"; }

          // Numbers
          if (/\d/.test(ch) || (ch === "." && /\d/.test(stream.string[stream.pos + 1]))) {
            stream.match(/[\d]*\.?[\d]*/);
            return "number";
          }

          // Words: keywords, builtins, identifiers
          if (/[a-zA-Z_]/.test(ch)) {
            var word = stream.match(/[a-zA-Z_][\w]*/)[0];
            if (SAS_KEYWORDS.test(word))  return "keyword";
            if (SAS_BUILTINS.test(word) && stream.peek() === "(") return "builtin";
            return "variable";
          }

          // Operators
          if (/[<>=!+\-*\/|]/.test(ch)) { stream.next(); return "operator"; }

          // Punctuation (semicolon highlighted as keyword for visibility)
          if (ch === ";") { stream.next(); return "keyword"; }

          stream.next();
          return null;
        }
      };
    });
  })();
  </script>
