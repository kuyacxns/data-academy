<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Data Academy – Übungsseite</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#0b1020; color:#e9eefc; }
    #root { min-height: 100vh; }
    .app-shell { padding: 16px; }
    .panel { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px 14px; }
    .muted { opacity: .75 }
  </style>

  <!-- React 18 (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (nur für DEV/Prototyping; in Produktion bitte prebuilden) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!--
    WICHTIG (Groq): API-Keys niemals im Frontend!
    Das KI-Feedback ruft deshalb einen Proxy auf: /api/groq-feedback
    (z.B. groq-proxy-server.js).
  -->

  <script>
    // Lesson-basierte Pixel-Scene-Erkennung (global) – Fix für "detectPixelScene is not defined"
    function detectPixelScene(lesson) {
      if (!lesson) return 'idle';
      const type = (typeof lesson === 'string') ? lesson : (lesson.type || lesson.mode || lesson.id || lesson.title || '');
      const t = String(type).toLowerCase();

      if (t.includes('exercise') || t.includes('uebung') || t.includes('practice')) return 'working';
      if (t.includes('theory') || t.includes('intro') || t.includes('explain')) return 'typing';
      if (t.includes('solution') || t.includes('review')) return 'review';
      return 'idle';
    }
  </script>

  <!--
    ES Module Bridge: wir laden den Hook aus deinem GitHub-/src-Ordner.
    Passe ggf. den Pfad an (./src/useGroqFeedback.js).
  -->
  <script type="module">
    import { useGroqFeedback } from './src/useGroqFeedback.js';
    window.useGroqFeedback = useGroqFeedback;
  </script>
</head>

<body>
  <div id="root"></div>

  <!--
    OPTIONAL: Wenn du weitere Module/Utilities hast, kannst du sie hier als Module importieren.
    Beispiel:
    <script type="module" src="./src/bootstrap.js"></script>
  -->

  <!-- React App (JSX) – MUSS type="text/babel" haben, sonst "Unexpected token" -->
  <script type="text/babel">
    const { useMemo, useState } = React;

    // Demo/Template: Du kannst hier deine bestehenden Komponenten aus src importieren,
    // aber Babel-Inline-Scripts können nicht direkt ES-Module importieren.
    // => Entweder: a) alles als Module bauen (Vite), oder b) Komponenten hier inline lassen.

    function AIFeedbackPanel({ userCode, currentLesson }) {
      // Toggle, um API-Spam zu verhindern (optional)
      const [enabled, setEnabled] = useState(true);

      const endpoint = useMemo(() => {
        // Wenn du Node-Proxy separat auf Port 8787 laufen lässt:
        return 'http://localhost:8787/api/groq-feedback';
        // Wenn du Reverse-Proxy/gleich-origin nutzt, nimm: '/api/groq-feedback'
      }, []);

      const { feedback, loading, error } = window.useGroqFeedback({
        code: userCode,
        lesson: currentLesson,
        enabled,
        endpoint,
        debounceMs: 700,
      });

      return (
        <div className="panel">
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <h3 style={{margin:'0 0 8px 0'}}>KI-Feedback</h3>
            <label className="muted" style={{display:'flex', gap:8, alignItems:'center'}}>
              <input type="checkbox" checked={enabled} onChange={e => setEnabled(e.target.checked)} />
              Aktiv
            </label>
          </div>

          {loading && <div className="muted">Analysiere…</div>}
          {error && <pre style={{color:'#ff9aa2', whiteSpace:'pre-wrap'}}>{error}</pre>}

          {feedback && (
            <div>
              <p><b>Summary:</b> {feedback.summary}</p>
              <p><b>Score:</b> {feedback.score}/100</p>

              <b>Errors:</b>
              <ul>{(feedback.errors || []).map((e,i) => <li key={i}>{e}</li>)}</ul>

              <b>Improvements:</b>
              <ul>{(feedback.improvements || []).map((t,i) => <li key={i}>{t}</li>)}</ul>
            </div>
          )}

          {!loading && !error && !feedback && (
            <div className="muted">Gib Code ein, um Feedback zu erhalten.</div>
          )}
        </div>
      );
    }

    function App() {
      // Beispiel-Zustände – ersetze durch deine echten States/Router/Lesson-Logik
      const [userCode, setUserCode] = useState('');
      const [currentLesson, setCurrentLesson] = useState({ id: 'exercise-1', type: 'exercise' });

      // Beispiel: Scene abhängig von Lesson
      const scene = detectPixelScene(currentLesson);

      return (
        <div className="app-shell">
          <h2 style={{marginTop:0}}>Übungsseite <span className="muted" style={{fontSize:14}}>(Scene: {scene})</span></h2>

          <div className="panel" style={{marginBottom:12}}>
            <div className="muted" style={{marginBottom:8}}>Code-Eingabe (Demo)</div>
            <textarea
              value={userCode}
              onChange={e => setUserCode(e.target.value)}
              rows={8}
              style={{width:'100%', background:'#0f1730', color:'#e9eefc', border:'1px solid rgba(255,255,255,0.12)', borderRadius:10, padding:10}}
              placeholder="Füge hier deinen Code ein…"
            />
            <div style={{display:'flex', gap:10, marginTop:10}}>
              <button onClick={() => setCurrentLesson({ id:'theory-1', type:'theory' })}>Theory</button>
              <button onClick={() => setCurrentLesson({ id:'exercise-1', type:'exercise' })}>Exercise</button>
              <button onClick={() => setCurrentLesson({ id:'review-1', type:'review' })}>Review</button>
            </div>
          </div>

          <AIFeedbackPanel userCode={userCode} currentLesson={currentLesson} />

          <p className="muted" style={{marginTop:12}}>
            Hinweis: Für ES-Module (./src/…) solltest du die Seite über einen lokalen Webserver öffnen (nicht file://).
          </p>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
