  <style>
  :root {
    --bg:          #0f1117;
    --bg2:         #161b27;
    --sidebar-bg:  #13161f;
    --surface:     rgba(255,255,255,0.055);
    --surface2:    rgba(255,255,255,0.09);
    --border:      rgba(255,255,255,0.10);
    --border2:     rgba(255,255,255,0.18);
    --text:        #eef2ff;
    --text2:       #b0bac9;
    --text3:       #6e7a8a;
    --sas:         #f59e0b;
    --sas-dim:     rgba(245,158,11,0.13);
    --py:          #38bdf8;
    --py-dim:      rgba(56,189,248,0.13);
    --green:       #4ade80;
    --green2:      #22c55e;
    --purple:      #c4b5fd;
    --radius:      14px;
    --radius-sm:   9px;
    --transition:  all 0.28s cubic-bezier(0.4,0,0.2,1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Outfit', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Animated background mesh ── */
  @keyframes bgShift {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.6; }
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(245,158,11,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(56,189,248,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 60% 30%, rgba(167,139,250,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
    animation: bgShift 8s ease-in-out infinite;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

  /* ── Scroll reveal animation ── */
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1),
                transform 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .reveal:nth-child(2) { transition-delay: 0.1s; }
  .reveal:nth-child(3) { transition-delay: 0.2s; }
  .reveal:nth-child(4) { transition-delay: 0.3s; }

  /* ── Glassmorphism surfaces ── */
  .glass {
    background: var(--surface);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--border);
  }

  .glass-strong {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    border: 1px solid var(--border2);
  }

  /* ── Typography ── */
  h1 { font-size: clamp(20px,3vw,26px); font-weight: 700; letter-spacing: -0.5px; line-height: 1.2; }
  h2 { font-size: clamp(16px,2vw,20px); font-weight: 600; }
  h3 { font-size: 15px; font-weight: 600; }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 99px; border: none;
    font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: 0.3px; cursor: pointer;
    transition: var(--transition);
    position: relative; overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }
  .btn:hover::after { background: rgba(255,255,255,0.08); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--green), #059669);
    color: #0a1a12;
    box-shadow: 0 4px 20px rgba(52,211,153,0.3);
  }
  .btn-primary:hover { box-shadow: 0 6px 30px rgba(52,211,153,0.45); }

  .btn-ghost {
    background: var(--surface);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

  /* ── Prism code blocks ── */
  pre[class*="language-"] {
    border-radius: var(--radius-sm) !important;
    margin: 16px 0 !important;
    font-size: 12.5px !important;
    font-family: 'JetBrains Mono', monospace !important;
    border: 1px solid var(--border) !important;
    background: rgba(0,0,0,0.4) !important;
    position: relative;
  }
  code[class*="language-"] {
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 12.5px !important;
  }
  pre[class*="language-"]::-webkit-scrollbar { height: 4px; }
  pre[class*="language-"]::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

  /* Inline code in theory text */
  p > code, li > code, td > code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 1px 6px;
    color: #e2e8f0;
  }

  /* Tables in theory */
  table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
  th {
    background: rgba(255,255,255,0.06);
    padding: 10px 14px; text-align: left;
    color: var(--text2); font-weight: 600; font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    border-bottom: 1px solid var(--border2);
  }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text2); }
  tr:hover td { background: rgba(255,255,255,0.03); color: var(--text); }
  tr:last-child td { border-bottom: none; }

  /* Headings in theory markdown */
  .theory-content h2 {
    font-size: 17px; font-weight: 700; color: var(--text);
    margin: 28px 0 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .theory-content h3 {
    font-size: 14px; font-weight: 600; color: var(--text2);
    margin: 20px 0 8px;
  }
  .theory-content p { color: var(--text2); margin-bottom: 12px; line-height: 1.8; font-size: 14px; }
  .theory-content ul, .theory-content ol {
    margin: 8px 0 12px 20px; color: var(--text2); font-size: 14px; line-height: 1.8;
  }
  .theory-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .theory-content strong { color: var(--text); font-weight: 600; }

  /* ── CodeMirror editor ── */
  .CodeMirror {
    height: auto !important; min-height: 300px;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 13px !important; line-height: 1.75 !important;
    background: rgba(0,0,0,0.5) !important;
    border-radius: 0 0 var(--radius-sm) var(--radius-sm) !important;
  }
  .CodeMirror-scroll { min-height: 300px; }
  .CodeMirror-gutters {
    background: rgba(0,0,0,0.3) !important;
    border-right: 1px solid var(--border) !important;
  }
  .CodeMirror-linenumber { color: #2d3748 !important; padding: 0 10px !important; }
  .CodeMirror-cursor { border-left: 2px solid var(--green) !important; }
  .CodeMirror-selected { background: rgba(52,211,153,0.12) !important; }
  .CodeMirror-focused .CodeMirror-selected { background: rgba(52,211,153,0.15) !important; }
  .CodeMirror-lines { padding: 10px 0 !important; }
  .CodeMirror-matchingbracket { color: var(--green) !important; outline: 1px solid var(--green); }

  .cm-s-dracula.CodeMirror  { background: transparent !important; color: #cdd6f4 !important; }
  .cm-s-dracula .cm-keyword  { color: #f38ba8 !important; font-weight: 600; }
  .cm-s-dracula .cm-def      { color: #a6e3a1 !important; font-weight: 600; }
  .cm-s-dracula .cm-string   { color: #f9e2af !important; }
  .cm-s-dracula .cm-string-2 { color: #f9e2af !important; }
  .cm-s-dracula .cm-number   { color: #cba6f7 !important; }
  .cm-s-dracula .cm-comment  { color: #6c7086 !important; font-style: italic; }
  .cm-s-dracula .cm-operator { color: #89dceb !important; }
  .cm-s-dracula .cm-variable { color: #cdd6f4 !important; }
  .cm-s-dracula .cm-variable-2 { color: #89b4fa !important; }
  .cm-s-dracula .cm-builtin  { color: #a6e3a1 !important; }
  .cm-s-dracula .cm-atom     { color: #cba6f7 !important; }
  .cm-s-dracula .cm-property { color: #89dceb !important; }

  .sas-editor .cm-s-dracula .cm-keyword    { color: #fab387 !important; font-weight: 700; }
  .sas-editor .cm-s-dracula .cm-builtin    { color: #a6e3a1 !important; }
  .sas-editor .cm-s-dracula .cm-variable   { color: #89b4fa !important; }
  .sas-editor .cm-s-dracula .cm-variable-2 { color: #cba6f7 !important; }
  .sas-editor .cm-s-dracula .cm-atom       { color: #fab387 !important; }

  /* ── Sidebar lesson item hover ── */
  .lesson-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px 8px 20px; cursor: pointer;
    font-size: 13px; font-weight: 400;
    border-radius: 9px; margin: 1px 8px;
    transition: background 0.2s, color 0.2s, transform 0.2s;
    color: var(--text2);
    position: relative;
  }
  .lesson-item:hover {
    color: var(--text);
    background: rgba(255,255,255,0.06);
    transform: translateX(2px);
  }
  .lesson-item.active {
    color: var(--lang-color, var(--green));
    background: color-mix(in srgb, var(--lang-color, var(--green)) 12%, transparent);
    font-weight: 600;
    transform: translateX(0);
  }
  .lesson-item.done { color: #4ade80; }
  .lesson-item::before { display: none; }

  /* ── Tab bar ── */
  .tab-btn {
    background: none; border: none; border-bottom: 2px solid transparent;
    padding: 14px 22px; cursor: pointer;
    font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
    letter-spacing: 0.5px; color: var(--text3);
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn:hover { color: var(--text2); }
  .tab-btn.active { color: var(--lang-color, var(--green)); border-bottom-color: var(--lang-color, var(--green)); }

  /* ── Lang picker card ── */
  .lang-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px; padding: 40px 36px; cursor: pointer;
    width: 320px; transition: transform 0.4s cubic-bezier(0.4,0,0.2,1),
                              border-color 0.3s, box-shadow 0.4s;
    position: relative; overflow: hidden;
  }
  .lang-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--card-color, #fff), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .lang-card:hover::before { opacity: 0.5; }
  .lang-card:hover { transform: translateY(-8px); }

  /* ── AI output formatting ── */
  .ai-output strong { color: #a78bfa; }
  .ai-output em { color: var(--text2); font-style: italic; }
  .ai-output code { 
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px; padding: 1px 6px;
  }
  .ai-output pre {
    background: rgba(0,0,0,0.4); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px; margin: 10px 0;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    overflow-x: auto; white-space: pre;
  }

  /* ── Animated counter ring ── */
  @keyframes ring-fill { from { stroke-dashoffset: 88; } }

  /* ── Smooth page transition ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.4s cubic-bezier(0.4,0,0.2,1) both; }

  /* ── Pulse dot ── */
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .pulse { animation: pulse 2s ease-in-out infinite; }

  /* ── Shimmer loading ── */
  @keyframes shimmer {
    from { background-position: -200% center; }
    to   { background-position: 200% center; }
  }
  .shimmer {
    background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.08) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
</style>

  <!-- Block 1: MODULES curriculum data (pure JSON strings, no Babel needed) -->
  <script>

const MODULES = [
  {
    id: "m1",
    title: "Grundlagen & Setup",
    icon: "🏗️",
    lessons: [
      {
        id: "l1_1",
        title: "Was ist SAS & PySpark?",
        theory: "\n## Was ist SAS Studio?\n**SAS (Statistical Analysis System)** ist eine kommerzielle Analyseplattform, die seit den 1970er Jahren in Unternehmen, Banken und Beh\u00f6rden eingesetzt wird. SAS Studio ist die browserbasierte IDE daf\u00fcr.\n\nSAS arbeitet mit sogenannten **DATA Steps** und **PROCs** (Procedures):\n- `DATA Step`: Liest, transformiert und schreibt Daten\n- `PROC` (Procedure): Vorgefertigte Analysebausteine (z.B. PROC SORT, PROC SQL, PROC MEANS)\n\n---\n\n## Was ist PySpark?\n**Apache Spark** ist ein verteiltes Rechensystem f\u00fcr Big Data. **PySpark** ist die Python-API daf\u00fcr. Anders als SAS l\u00e4uft PySpark auf Clustern und kann Terabytes von Daten verarbeiten.\n\nKernkonzept: **DataFrame** \u2013 eine verteilte Tabelle, \u00e4hnlich wie in Pandas, aber f\u00fcr Big Data.\n\n---\n\n## Philosophie-Vergleich\n\n| Aspekt | SAS Studio | PySpark |\n|--------|-----------|---------|\n| Sprache | Propriet\u00e4res SAS | Python |\n| Daten | Lokal / SAS-Server | Verteilt (Cluster) |\n| Syntax | Prozedural | Funktional/OOP |\n| Kosten | Lizenzpflichtig | Open Source |\n| St\u00e4rke | Statistik, Regulated Industries | Big Data, ML |\n\n---\n\n## Der erste Code \u2013 Daten einlesen\n\n### SAS:\n```sas\n/* Daten direkt im Code definieren */\nDATA kunden;\n  INPUT name $ alter stadt $;\n  DATALINES;\n  Mueller 35 Berlin\n  M\u00fcller 28 Hamburg\n  O'Brien 42 M\u00fcnchen\n  ;\nRUN;\n\n/* Ausgabe anzeigen */\nPROC PRINT DATA=kunden;\nRUN;\n```\n\n### PySpark:\n```python\nfrom pyspark.sql import SparkSession\nfrom pyspark.sql.types import StructType, StructField, StringType, IntegerType\n\n# SparkSession erstellen (Einstiegspunkt)\nspark = SparkSession.builder     .appName(\"Kundendaten\")     .getOrCreate()\n\n# Daten definieren\ndaten = [\n    (\"Mueller\", 35, \"Berlin\"),\n    (\"M\u00fcller\", 28, \"Hamburg\"),\n    (\"O'Brien\", 42, \"M\u00fcnchen\")\n]\n\nschema = StructType([\n    StructField(\"name\", StringType(), True),\n    StructField(\"alter\", IntegerType(), True),\n    StructField(\"stadt\", StringType(), True)\n])\n\n# DataFrame erstellen\nkunden = spark.createDataFrame(daten, schema)\n\n# Ausgabe\nkunden.show()\n```\n\n**Wichtig:** In PySpark ist spark die zentrale Session \u2013 sie verwaltet alle Ressourcen. Analog zu SAS, wo alles \u00fcber die SAS-Session l\u00e4uft.\n",
        exercise: {
          description: "Erstelle einen Datensatz mit 3 Mitarbeitern (name, abteilung, gehalt). Gib die Daten aus.",
          sasSolution: "DATA mitarbeiter;\n  INPUT name $ abteilung $ gehalt;\n  DATALINES;\n  Schmidt IT 4500\n  Weber HR 3800\n  Fischer Finance 5200\n  ;\nRUN;\n\nPROC PRINT DATA=mitarbeiter;\nRUN;",
          pysparkSolution: "from pyspark.sql import SparkSession\nfrom pyspark.sql.types import *\n\nspark = SparkSession.builder.appName(\"Mitarbeiter\").getOrCreate()\n\ndaten = [\n    (\"Schmidt\", \"IT\", 4500),\n    (\"Weber\", \"HR\", 3800),\n    (\"Fischer\", \"Finance\", 5200)\n]\n\nschema = StructType([\n    StructField(\"name\", StringType(), True),\n    StructField(\"abteilung\", StringType(), True),\n    StructField(\"gehalt\", IntegerType(), True)\n])\n\nmitarbeiter = spark.createDataFrame(daten, schema)\nmitarbeiter.show()",
          hints: ["In SAS nutzt du DATALINES für inline-Daten", "In PySpark nutzt du createDataFrame() mit einer Liste von Tupeln", "Vergiss das Schema-Definition in PySpark nicht"]
        }
      },
      {
        id: "l1_2",
        title: "Variablen & Datentypen",
        theory: "\n## Datentypen im Vergleich\n\n### SAS Datentypen\nSAS kennt nur **zwei** Grundtypen:\n- **Character** (`$`) \u2013 Text bis 32.767 Zeichen\n- **Numeric** \u2013 Zahlen (immer 8-Byte Float)\n\n```sas\nDATA typen_beispiel;\n  /* Character-Variable: $ am Ende */\n  name = \"Klaus-Dieter M\u00fcller\";\n  plz  = \"80333\";      /* PLZ als String! */\n  \n  /* Numeric */\n  alter   = 42;\n  gehalt  = 3850.75;\n  \n  /* Datum (intern als Zahl gespeichert) */\n  gebdat  = '15JAN1982'D;\n  FORMAT gebdat DATE9.;\nRUN;\n\nPROC PRINT DATA=typen_beispiel;\nRUN;\n```\n\n### PySpark Datentypen\nPySpark hat ein **reichhaltiges Typsystem**:\n\n```python\nfrom pyspark.sql.types import *\n\nschema = StructType([\n    StructField(\"name\",    StringType(),    True),\n    StructField(\"plz\",     StringType(),    True),   # PLZ als String\n    StructField(\"alter\",   IntegerType(),   True),\n    StructField(\"gehalt\",  DoubleType(),    True),\n    StructField(\"gebdat\",  DateType(),      True),\n    StructField(\"aktiv\",   BooleanType(),   True),\n    StructField(\"tags\",    ArrayType(StringType()), True),  # Kein \u00c4quivalent in SAS!\n])\n```\n\n---\n\n## Variablen umbenennen\n\n### SAS:\n```sas\nDATA neu;\n  SET alt;\n  RENAME vorname = first_name\n         nachname = last_name;\nRUN;\n```\n\n### PySpark:\n```python\ndf_neu = df_alt     .withColumnRenamed(\"vorname\", \"first_name\")     .withColumnRenamed(\"nachname\", \"last_name\")\n```\n\n---\n\n## Neue Spalten berechnen\n\n### SAS:\n```sas\nDATA berechnet;\n  SET mitarbeiter;\n  jahresgehalt = gehalt * 12;\n  name_upper   = UPCASE(name);\n  name_laenge  = LENGTH(STRIP(name));\nRUN;\n```\n\n### PySpark:\n```python\nfrom pyspark.sql import functions as F\n\ndf_berechnet = mitarbeiter     .withColumn(\"jahresgehalt\", F.col(\"gehalt\") * 12)     .withColumn(\"name_upper\",   F.upper(F.col(\"name\")))     .withColumn(\"name_laenge\",  F.length(F.trim(F.col(\"name\"))))\n```\n\n**Muster:** In PySpark verwendest du fast immer `F.col(\"spaltenname\")` um auf Spalten zu verweisen, und `withColumn()` um neue anzulegen.\n",

    icon: "🔬",
    lessons: [
      {
        id: "l3_1",
        title: "Sonderzeichen erkennen",
        theory: "\n## Datenqualit\u00e4tspr\u00fcfung: Namen auf Sonderzeichen\n\nDas ist dein **Kernthema**: Namen in Datenbanken enthalten oft unerw\u00fcnschte Sonderzeichen durch Erfassungsfehler, Systemmigrationen oder Encoding-Probleme.\n\n---\n\n## Was gilt als \"unzul\u00e4ssiges\" Sonderzeichen?\n\nBei Namen sind typischerweise erlaubt:\n- Buchstaben (inkl. Umlaute: \u00e4 \u00f6 \u00fc \u00df \u00c1 \u00c9 etc.)\n- Bindestrich `-` (Doppelname)\n- Apostroph `'` (O'Brien, D'Angelo)\n- Leerzeichen\n- Punkt `.` (Abk\u00fcrzungen: St., Dr.)\n\nTypische **Probleme**:\n- `@`, `#`, `!`, `&` (Sonderzeichen aus HTML/Encoding)\n- Zahlen `0-9` im Namen\n- Doppelte Leerzeichen\n- F\u00fchrende/nachgestellte Leerzeichen\n- NULL-Bytes oder Steuerzeichen\n\n---\n\n## Regul\u00e4re Ausdr\u00fccke (Regex) \u2013 Grundlagen\n\n| Muster | Bedeutung |\n|--------|-----------|\n| `[a-zA-Z]` | Lateinische Buchstaben |\n| `[\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df]` | Deutsche Umlaute |\n| `\\\\s` | Whitespace (Leerzeichen, Tab) |\n| `[^...]` | NICHT die aufgef\u00fchrten Zeichen |\n| `+` | Ein oder mehr |\n| `*` | Null oder mehr |\n| `^` | Anfang des Strings |\n| `$` | Ende des Strings |\n\n---\n\n## Pr\u00fcfung in SAS mit PRXMATCH / PRXPARSE\n\n```sas\nDATA namen_pruefung;\n  SET kundendaten;\n  \n  /* Regex: Erlaubt sind Buchstaben, Umlaute, -, ', ., Leerzeichen */\n  pattern_id = PRXPARSE('/[^a-zA-Z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\u00e0\u00e1\u00e2\u00e3\u00e8\u00e9\u00ea\u00eb\u00ec\u00ed\u00ee\u00ef\u00f9\u00fa\u00fb\u00fd\u00c0\u00c1\u00c2\u00c3\u00c8\u00c9\u00ca\u00cb\u00cc\u00cd\u00ce\u00cf\u00d9\u00da\u00db\u00dd\\s\\-\\'\\.]/');;\n  \n  /* 1 = Sonderzeichen gefunden, 0 = OK */\n  hat_sonderzeichen = (PRXMATCH(pattern_id, STRIP(name)) > 0);\n  \n  /* Welche Zeichen genau? */\n  ungueltige_zeichen = PRXCHANGE('s/[a-zA-Z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\u00e0\u00e1\u00e2\u00e3\u00e8\u00e9\u00ea\u00eb\u00ec\u00ed\u00ee\u00ef\u00f9\u00fa\u00fb\u00fd\u00c0\u00c1\u00c2\u00c3\u00c8\u00c9\u00ca\u00cb\u00cc\u00cd\u00ce\u00cf\u00d9\u00da\u00db\u00dd\\s\\-\\'\\.]//','\u20131', name);\n  \n  /* Leerzeichen-Probleme */\n  hat_leading_space  = (name NE STRIP(name));\n  hat_doppelspace    = INDEX(COMPBL(name), '  ') > 0; /* Doppelspace nach COMPBL noch vorhanden? */\n  \n  /* Nur problematische ausgeben */\n  hat_problem = (hat_sonderzeichen OR hat_leading_space);\n  \n  CALL PRXFREE(pattern_id);\nRUN;\n\n/* Zusammenfassung */\nPROC FREQ DATA=namen_pruefung;\n  TABLES hat_sonderzeichen hat_leading_space / MISSING;\nRUN;\n\n/* Problematische Namen anzeigen */\nPROC PRINT DATA=namen_pruefung;\n  WHERE hat_problem = 1;\n  VAR name hat_sonderzeichen ungueltige_zeichen hat_leading_space;\nRUN;\n```\n\n---\n\n## Pr\u00fcfung in PySpark mit regexp\n\n```python\nfrom pyspark.sql import functions as F\nfrom pyspark.sql import SparkSession\n\nspark = SparkSession.builder.appName(\"Namenpruefung\").getOrCreate()\n\n# Regex-Pattern: Zeichen die NICHT erlaubt sind\nUNERLAUBT = r'[^a-zA-Z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\u00e0\u00e1\u00e2\u00e3\u00e8\u00e9\u00ea\u00eb\u00ec\u00ed\u00ee\u00ef\u00f9\u00fa\u00fb\u00fd\u00c0\u00c1\u00c2\u00c3\u00c8\u00c9\u00ca\u00cb\u00cc\u00cd\u00ce\u00cf\u00d9\u00da\u00db\u00dd\\s\\-\\'\\.]'\n\ndf_geprueft = kundendaten     .withColumn(\n        \"hat_sonderzeichen\",\n        F.col(\"name\").rlike(UNERLAUBT)\n    )     .withColumn(\n        \"hat_leading_space\",\n        F.col(\"name\") != F.trim(F.col(\"name\"))\n    )     .withColumn(\n        \"hat_doppelspace\",\n        F.col(\"name\").rlike(r'  ')   # zwei Leerzeichen\n    )     .withColumn(\n        \"name_bereinigt\",\n        F.trim(F.regexp_replace(F.col(\"name\"), r'  +', ' '))\n    )     .withColumn(\n        \"hat_problem\",\n        F.col(\"hat_sonderzeichen\") | F.col(\"hat_leading_space\") | F.col(\"hat_doppelspace\")\n    )\n\n# Statistik\nprint(\"Problemf\u00e4lle gesamt:\", df_geprueft.filter(F.col(\"hat_problem\")).count())\ndf_geprueft.groupBy(\"hat_sonderzeichen\", \"hat_leading_space\").count().show()\n\n# Nur Problemf\u00e4lle\ndf_geprueft.filter(F.col(\"hat_problem\")).select(\n    \"name\", \"hat_sonderzeichen\", \"hat_leading_space\", \"hat_doppelspace\"\n).show(50, truncate=False)\n```\n",
        exercise: {
          description: "Prüfe den folgenden Namens-Datensatz auf Sonderzeichen, führende/nachgestellte Leerzeichen und Doppelleerzeichen. Gib eine Zusammenfassung der Fehler aus.",
          sasSolution: "DATA test_namen;\n  INPUT name $50.;\n  DATALINES;\n  Mueller\n  M\u00fcller\n  O'Brien\n  van  der Berg\n   Schmidt\n  Fischer!\n  Meier@web.de\n  ;\nRUN;\n\nDATA namen_pruefung;\n  SET test_namen;\n  pattern_id = PRXPARSE('/[^a-zA-Z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\\s\\-\\'\\.]/');;\n  hat_sonderzeichen = (PRXMATCH(pattern_id, STRIP(name)) > 0);\n  hat_leading_space = (name NE STRIP(name));\n  hat_doppelspace   = (INDEX(name, '  ') > 0);\n  hat_problem = (hat_sonderzeichen OR hat_leading_space OR hat_doppelspace);\n  CALL PRXFREE(pattern_id);\nRUN;\n\nPROC PRINT DATA=namen_pruefung;\n  WHERE hat_problem = 1;\nRUN;\n\nPROC FREQ DATA=namen_pruefung;\n  TABLES hat_sonderzeichen hat_leading_space hat_doppelspace;\nRUN;",
          pysparkSolution: "from pyspark.sql import functions as F\n\ndaten = [\n    (\"Mueller\",),\n    (\"M\u00fcller\",),\n    (\"O'Brien\",),\n    (\"van  der Berg\",),\n    (\" Schmidt\",),\n    (\"Fischer!\",),\n    (\"Meier@web.de\",),\n]\ndf = spark.createDataFrame(daten, [\"name\"])\n\nUNERLAUBT = r\"[^a-zA-Z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\\s\\-'\\.]\"\n\ndf_geprueft = df     .withColumn(\"hat_sonderzeichen\", F.col(\"name\").rlike(UNERLAUBT))     .withColumn(\"hat_leading_space\", F.col(\"name\") != F.trim(F.col(\"name\")))     .withColumn(\"hat_doppelspace\", F.col(\"name\").rlike(r\"  \"))     .withColumn(\"hat_problem\",\n        F.col(\"hat_sonderzeichen\") | F.col(\"hat_leading_space\") | F.col(\"hat_doppelspace\"))\n\ndf_geprueft.filter(F.col(\"hat_problem\")).show(truncate=False)\ndf_geprueft.groupBy(\"hat_sonderzeichen\",\"hat_leading_space\",\"hat_doppelspace\").count().show()",
          hints: ["Regex: [^ ] bedeutet 'nicht diese Zeichen'", "PySpark: .rlike() für Regex-Matching", "SAS: PRXMATCH() gibt Position zurück (>0 = gefunden)"]
        }
      },
      {
        id: "l3_2",
        title: "Namen bereinigen & reparieren",
        theory: "\n## Namen automatisch bereinigen\n\nNachdem wir Probleme erkannt haben, k\u00f6nnen wir sie systematisch beheben.\n\n---\n\n## Bereinigungsstrategie\n\n1. **Leerzeichen normalisieren** (trim + collapse)\n2. **Encoding-Artefakte** ersetzen (`&amp;` \u2192 `&`)\n3. **Unzul\u00e4ssige Zeichen** markieren oder entfernen\n4. **Gro\u00df/Kleinschreibung** normalisieren (optional)\n\n---\n\n## SAS: Systematische Bereinigung\n\n```sas\nDATA namen_bereinigt;\n  SET namen_roh;\n  \n  name_orig = name;  /* Original sichern */\n  \n  /* Schritt 1: Leerzeichen normalisieren */\n  name = STRIP(name);           /* Leading/Trailing entfernen */\n  name = COMPBL(name);          /* Mehrfache Spaces -> einzeln */\n  \n  /* Schritt 2: HTML-Entities ersetzen */\n  name = TRANWRD(name, '&amp;', '&');\n  name = TRANWRD(name, '&lt;',  '<');\n  name = TRANWRD(name, '&gt;',  '>');\n  name = TRANWRD(name, '&#39;', \"'\");\n  \n  /* Schritt 3: Steuerzeichen entfernen (non-printable) */\n  /* Alle Zeichen mit ASCII < 32 oder > 126 au\u00dfer Umlauten */\n  /* Mit PRXCHANGE sauber ersetzen */\n  name = PRXCHANGE('s/[\\x00-\\x1F\\x7F]//g', -1, name);\n  \n  /* Schritt 4: Ergebnis pr\u00fcfen */\n  wurde_geaendert = (name NE name_orig);\nRUN;\n\n/* \u00dcberblick \u00fcber \u00c4nderungen */\nPROC PRINT DATA=namen_bereinigt;\n  WHERE wurde_geaendert = 1;\n  VAR name_orig name wurde_geaendert;\nRUN;\n```\n\n---\n\n## PySpark: Bereinigungspipeline\n\n```python\nfrom pyspark.sql import functions as F\n\ndef bereinige_namen(df, spalte=\"name\"):\n    \"\"\"Vollst\u00e4ndige Bereinigungspipeline f\u00fcr Namen-Spalten.\"\"\"\n    \n    return df         .withColumn(f\"{spalte}_orig\", F.col(spalte))                 # Schritt 1: Leerzeichen normalisieren\n        .withColumn(spalte, F.trim(F.col(spalte)))         .withColumn(spalte, F.regexp_replace(F.col(spalte), r'\\s+', ' '))                 # Schritt 2: HTML-Entities ersetzen\n        .withColumn(spalte, F.regexp_replace(F.col(spalte), '&amp;', '&'))         .withColumn(spalte, F.regexp_replace(F.col(spalte), '&#39;', \"'\"))         .withColumn(spalte, F.regexp_replace(F.col(spalte), '&lt;',  '<'))                 # Schritt 3: Steuerzeichen entfernen\n        .withColumn(spalte, F.regexp_replace(F.col(spalte), r'[\\x00-\\x1F\\x7F]', ''))                 # Schritt 4: \u00c4nderung markieren\n        .withColumn(\"wurde_geaendert\", F.col(spalte) != F.col(f\"{spalte}_orig\"))\n\n# Anwenden\ndf_bereinigt = bereinige_namen(kundendaten, \"name\")\n\n# Nur Ge\u00e4nderte\ndf_bereinigt.filter(F.col(\"wurde_geaendert\"))     .select(\"name_orig\", \"name\")     .show(truncate=False)\n```\n\n---\n\n## Vollst\u00e4ndige DQ-Report-Funktion in PySpark\n\n```python\ndef dq_report_namen(df, spalte=\"name\"):\n    \"\"\"Erstellt einen vollst\u00e4ndigen Datenqualit\u00e4ts-Report f\u00fcr eine Namensspalte.\"\"\"\n    \n    ERLAUBT = r\"^[a-zA-Z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\u00e0\u00e1\u00e2\u00e3\u00e8\u00e9\u00ea\u00eb\u00ec\u00ed\u00ee\u00ef\u00f9\u00fa\u00fb\u00fd\u00c0\u00c1\u00c2\u00c3\u00c8\u00c9\u00ca\u00cb\u00cc\u00cd\u00ce\u00cf\u00d9\u00da\u00db\u00dd\\s\\-'\\. ]+$\"\n    \n    analysiert = df.withColumn(\n        \"ist_leer\",        F.col(spalte).isNull() | (F.trim(F.col(spalte)) == \"\")\n    ).withColumn(\n        \"hat_leadtrail\",   F.col(spalte) != F.trim(F.col(spalte))\n    ).withColumn(\n        \"hat_doppelspace\", F.col(spalte).rlike(r\"  \")\n    ).withColumn(\n        \"hat_sonderzeichen\", ~F.col(spalte).rlike(ERLAUBT)\n    ).withColumn(\n        \"hat_zahl\",        F.col(spalte).rlike(r\"\\d\")\n    )\n    \n    gesamt = df.count()\n    \n    print(f\"\\n{'='*50}\")\n    print(f\"DQ-Report f\u00fcr Spalte: {spalte}\")\n    print(f\"{'='*50}\")\n    print(f\"Gesamt:            {gesamt:>8,}\")\n    \n    for pruefung in [\"ist_leer\",\"hat_leadtrail\",\"hat_doppelspace\",\"hat_sonderzeichen\",\"hat_zahl\"]:\n        anzahl = analysiert.filter(F.col(pruefung)).count()\n        pct = anzahl / gesamt * 100 if gesamt > 0 else 0\n        print(f\"{pruefung:<22} {anzahl:>8,}  ({pct:5.1f}%)\")\n    \n    return analysiert\n```\n",
        exercise: {
          description: "Schreibe eine Bereinigungsfunktion, die: 1) Leerzeichen normalisiert, 2) HTML-Entities (&amp; etc.) ersetzt, 3) Zahlen aus Namen entfernt, 4) markiert ob etwas geändert wurde.",
          sasSolution: "DATA namen_roh;\n  INPUT name $100.;\n  DATALINES;\n  &amp;Mueller\n  van  der  Berg\n   Fischer \n  M\u00fcller123\n  O'Brien\n  ;\nRUN;\n\nDATA namen_bereinigt;\n  SET namen_roh;\n  name_orig = name;\n  name = STRIP(name);\n  name = COMPBL(name);\n  name = TRANWRD(name, '&amp;', '&');\n  name = PRXCHANGE('s/[0-9]//g', -1, name);\n  wurde_geaendert = (name NE name_orig);\nRUN;\n\nPROC PRINT DATA=namen_bereinigt;\n  VAR name_orig name wurde_geaendert;\nRUN;",
          pysparkSolution: "daten = [(\"&amp;Mueller\",), (\"van  der  Berg\",), (\" Fischer \",), (\"M\u00fcller123\",), (\"O'Brien\",)]\ndf = spark.createDataFrame(daten, [\"name\"])\n\ndf_bereinigt = df     .withColumn(\"name_orig\", F.col(\"name\"))     .withColumn(\"name\", F.trim(F.col(\"name\")))     .withColumn(\"name\", F.regexp_replace(F.col(\"name\"), r\"\\s+\", \" \"))     .withColumn(\"name\", F.regexp_replace(F.col(\"name\"), \"&amp;\", \"&\"))     .withColumn(\"name\", F.regexp_replace(F.col(\"name\"), r\"[0-9]\", \"\"))     .withColumn(\"wurde_geaendert\", F.col(\"name\") != F.col(\"name_orig\"))\n\ndf_bereinigt.show(truncate=False)",
          hints: ["SAS: COMPBL() kollabiert Mehrfach-Spaces", "PySpark: regexp_replace mit r'\\s+' für mehrfache Spaces", "TRANWRD / regexp_replace für Text-Ersetzungen"]
        }
      },
      {
        id: "l3_3",
        title: "Erweiterte Regex & Zeichensatz-Analyse",
        theory: "\n## Unicode & Encoding-Probleme bei Namen\n\nIn der Praxis treffen wir auf komplexe Encoding-Probleme \u2013 besonders bei Namen aus verschiedenen Kulturen.\n\n---\n\n## H\u00e4ufige Encoding-Artefakte\n\n```\nFalsch geencodet:    Richtig:\n\u00c3\u00bc                  \u00fc\n\u00c3\u00b6                  \u00f6\n\u00c3\u00a4                  \u00e4\n\u00c3                   \u00dc / \u00d6 / \u00c4\n\u00e2\u20ac\u2122                 '\n\u00e2\u20ac\"                 \u2013\n```\n\n---\n\n## Vollst\u00e4ndige Unicode-Buchstaben-Regex\n\nF\u00fcr internationale Namen (inkl. Slawisch, Skandinavisch, etc.):\n\n### SAS \u2013 Unicode-Aware Matching:\n```sas\n/* SAS muss f\u00fcr Unicode konfiguriert sein (PROC OPTIONS: ENCODING=UTF8) */\n\nOPTIONS ENCODING=UTF8;\n\nDATA unicode_pruefung;\n  SET kundendaten;\n  \n  /* Breites Pattern f\u00fcr internationale Namen */\n  /* Latein + Erweiterungen + Kyrillisch + Griechisch */\n  pattern = PRXPARSE(\n    '/[^\\p{L}\\p{M}\\s\\-\\'\\.]/'  /* \\p{L} = jeder Unicode-Buchstabe */\n  );\n  \n  hat_nicht_buchstabe = (PRXMATCH(pattern, name) > 0);\n  CALL PRXFREE(pattern);\nRUN;\n```\n\n### PySpark \u2013 Unicode mit Java Regex:\n```python\n# \\p{L} = Unicode Letter (alle Sprachen!)\n# \\p{M} = Unicode Mark (Akzente, Diakritika)\n\nUNICODE_NAME_PATTERN = r\"[^\\p{L}\\p{M}\\s\\-'\\.]\"\n\ndf_unicode = kundendaten.withColumn(\n    \"hat_nicht_buchstabe\",\n    F.col(\"name\").rlike(UNICODE_NAME_PATTERN)\n)\n```\n\n---\n\n## Zeichenfrequenz-Analyse\n\nFinde heraus, welche Sonderzeichen am h\u00e4ufigsten vorkommen:\n\n### PySpark:\n```python\nfrom pyspark.sql import functions as F\n\n# Jeden Namen in einzelne Zeichen aufteilen\ndf_zeichen = kundendaten     .withColumn(\"zeichen_array\", F.split(F.col(\"name\"), \"\"))     .withColumn(\"zeichen\", F.explode(F.col(\"zeichen_array\")))\n\n# Nur nicht-erlaubte Zeichen\nERLAUBT_SET = set(\"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ\"\n                   \"\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df \u00e0\u00e1\u00e2\u00e3\u00e8\u00e9\u00ea\u00eb\u00ec\u00ed\u00ee\u00ef\u00f9\u00fa\u00fb\u00fd- '.\")\n\n# H\u00e4ufigkeit pro Zeichen\ndf_zeichen     .filter(~F.col(\"zeichen\").isin(list(ERLAUBT_SET)))     .filter(F.col(\"zeichen\") != \"\")     .groupBy(\"zeichen\")     .count()     .orderBy(F.col(\"count\").desc())     .show(20)\n```\n\n### SAS \u2013 Zeichenfrequenz:\n```sas\nDATA zeichen_analyse;\n  SET kundendaten;\n  \n  /* Durch jeden Buchstaben iterieren */\n  DO i = 1 TO LENGTH(name);\n    zeichen = SUBSTR(name, i, 1);\n    /* Nur Nicht-Standard-Zeichen ausgeben */\n    IF NOT PRXMATCH('/[a-zA-Z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\\s\\-\\'\\.]/', zeichen) \n       AND zeichen NE '' \n    THEN OUTPUT;\n  END;\n  \n  KEEP name zeichen;\nRUN;\n\nPROC FREQ DATA=zeichen_analyse ORDER=FREQ;\n  TABLES zeichen / MISSING;\nRUN;\n```\n\n---\n\n## Pr\u00fcfung auf NULL-Bytes & versteckte Steuerzeichen\n\n```python\n# Hexadezimale Darstellung zum Debuggen\ndf_hex = kundendaten.withColumn(\n    \"name_hex\",\n    F.hex(F.col(\"name\").cast(\"binary\"))\n).withColumn(\n    \"hat_nullbyte\",\n    F.col(\"name\").rlike(r\"\\x00\")\n).withColumn(\n    \"hat_steuerzeichen\",\n    F.col(\"name\").rlike(r\"[\\x01-\\x1F\\x7F]\")\n)\n\ndf_hex.filter(\n    F.col(\"hat_nullbyte\") | F.col(\"hat_steuerzeichen\")\n).show(truncate=False)\n```\n",
        exercise: {
          description: "Erstelle eine vollständige Zeichenfrequenz-Analyse: Finde alle nicht-erlaubten Zeichen im Datensatz und zeige wie oft jedes vorkommt.",
          sasSolution: "DATA test_namen;\n  INPUT name $100.;\n  DATALINES;\n  M\u00fcller!\n  Fischer@123\n  O'Brien\n  van der Berg\n  Meier&S\u00f6hne\n  ;\nRUN;\n\nDATA zeichen_analyse;\n  SET test_namen;\n  DO i = 1 TO LENGTH(STRIP(name));\n    zeichen = SUBSTR(STRIP(name), i, 1);\n    ascii_wert = RANK(zeichen);\n    IF NOT PRXMATCH('/[a-zA-Z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\\s\\-\\'\\.]/', zeichen)\n    THEN OUTPUT;\n  END;\n  KEEP name zeichen ascii_wert;\nRUN;\n\nPROC FREQ DATA=zeichen_analyse ORDER=FREQ;\n  TABLES zeichen / MISSING;\nRUN;",
          pysparkSolution: "daten = [(\"M\u00fcller!\",), (\"Fischer@123\",), (\"O'Brien\",), (\"van der Berg\",), (\"Meier&S\u00f6hne\",)]\ndf = spark.createDataFrame(daten, [\"name\"])\n\nERLAUBT = \"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df -'.\"\n\ndf_zeichen = df     .withColumn(\"zeichen_array\", F.split(F.col(\"name\"), \"\"))     .withColumn(\"zeichen\", F.explode(F.col(\"zeichen_array\")))\n\ndf_zeichen     .filter(~F.col(\"zeichen\").isin(list(ERLAUBT)))     .filter(F.col(\"zeichen\") != \"\")     .groupBy(\"zeichen\").count()     .orderBy(F.col(\"count\").desc())     .show()",
          hints: ["SAS: SUBSTR(name, i, 1) holt ein Zeichen an Position i", "PySpark: F.split() + F.explode() für Zeichenzerlegung", "Danach groupBy('zeichen').count()"]
        }
      }

        theory: "\n## Aggregation: GROUP BY\n\n### SAS \u2013 PROC SQL und DATA Step:\n```sas\n/* Mit PROC SQL */\nPROC SQL;\n  SELECT\n    abteilung,\n    COUNT(*)              AS anzahl,\n    AVG(gehalt)           AS avg_gehalt FORMAT=8.2,\n    MIN(gehalt)           AS min_gehalt,\n    MAX(gehalt)           AS max_gehalt,\n    SUM(gehalt)           AS sum_gehalt\n  FROM mitarbeiter\n  GROUP BY abteilung\n  ORDER BY avg_gehalt DESC;\nQUIT;\n\n/* Mit PROC MEANS */\nPROC MEANS DATA=mitarbeiter NWAY NOPRINT;\n  CLASS abteilung;\n  VAR gehalt;\n  OUTPUT OUT=stats\n    N=anzahl\n    MEAN=avg_gehalt\n    MIN=min_gehalt\n    MAX=max_gehalt\n    SUM=sum_gehalt;\nRUN;\n\nPROC PRINT DATA=stats; RUN;\n```\n\n### PySpark \u2013 groupBy():\n```python\nfrom pyspark.sql import functions as F\n\nstats = mitarbeiter.groupBy(\"abteilung\").agg(\n    F.count(\"*\").alias(\"anzahl\"),\n    F.avg(\"gehalt\").alias(\"avg_gehalt\"),\n    F.min(\"gehalt\").alias(\"min_gehalt\"),\n    F.max(\"gehalt\").alias(\"max_gehalt\"),\n    F.sum(\"gehalt\").alias(\"sum_gehalt\")\n).orderBy(F.col(\"avg_gehalt\").desc())\n\nstats.show()\n```\n\n---\n\n## Pivot-Tabellen\n\n### SAS:\n```sas\nPROC TABULATE DATA=umsatz;\n  CLASS region quartal;\n  VAR umsatz;\n  TABLE region, quartal*umsatz*SUM;\nRUN;\n```\n\n### PySpark:\n```python\npivot = umsatz.groupBy(\"region\").pivot(\"quartal\").agg(F.sum(\"umsatz\"))\npivot.show()\n```\n\n---\n\n## Window Functions \u2013 Ranking & Laufende Summen\n\n### SAS:\n```sas\nPROC SQL;\n  SELECT\n    name,\n    gehalt,\n    abteilung,\n    RANK() OVER (PARTITION BY abteilung ORDER BY gehalt DESC) AS rang,\n    SUM(gehalt) OVER (PARTITION BY abteilung) AS abt_summe,\n    gehalt / SUM(gehalt) OVER (PARTITION BY abteilung) AS anteil\n  FROM mitarbeiter;\nQUIT;\n```\n\n### PySpark:\n```python\nfrom pyspark.sql.window import Window\n\n# Window-Spezifikation\nw_abt = Window.partitionBy(\"abteilung\").orderBy(F.col(\"gehalt\").desc())\nw_abt_all = Window.partitionBy(\"abteilung\")\n\ndf_window = mitarbeiter     .withColumn(\"rang\",      F.rank().over(w_abt))     .withColumn(\"abt_summe\", F.sum(\"gehalt\").over(w_abt_all))     .withColumn(\"anteil\",    F.col(\"gehalt\") / F.sum(\"gehalt\").over(w_abt_all))\n\ndf_window.show()\n```\n",

          sasSolution: "/* Statistiken pro Abteilung */\nPROC SQL;\n  SELECT\n    abteilung,\n    COUNT(*) AS anzahl,\n    AVG(gehalt) AS avg_gehalt FORMAT=8.0,\n    MIN(gehalt) AS min_gehalt,\n    MAX(gehalt) AS max_gehalt\n  FROM mitarbeiter\n  GROUP BY abteilung;\nQUIT;\n\n/* Rang innerhalb Abteilung */\nPROC SQL;\n  SELECT\n    name, abteilung, gehalt,\n    RANK() OVER (PARTITION BY abteilung ORDER BY gehalt DESC) AS rang_in_abt\n  FROM mitarbeiter\n  ORDER BY abteilung, rang_in_abt;\nQUIT;",

        title: "INNER, LEFT, FULL JOIN",
        theory: "\n## JOINs im Vergleich\n\nJOINs sind fundamental f\u00fcr die Arbeit mit relationalen Daten.\n\n| JOIN-Typ | SAS | PySpark |\n|----------|-----|---------|\n| INNER JOIN | MERGE + IN= oder SQL | .join(how=\"inner\") |\n| LEFT JOIN | MERGE + IN= | .join(how=\"left\") |\n| RIGHT JOIN | MERGE | .join(how=\"right\") |\n| FULL OUTER | MERGE | .join(how=\"outer\") |\n| CROSS JOIN | PROC SQL CROSS | .crossJoin() |\n\n---\n\n## INNER JOIN\n\n### SAS:\n```sas\n/* Variante 1: PROC SQL (empfohlen f\u00fcr JOINs) */\nPROC SQL;\n  SELECT\n    k.kunden_id,\n    k.name,\n    b.bestellnr,\n    b.betrag\n  FROM kunden k\n  INNER JOIN bestellungen b\n    ON k.kunden_id = b.kunden_id;\nQUIT;\n\n/* Variante 2: DATA Step MERGE (nur bei gleicher Sortierung!) */\nPROC SORT DATA=kunden;      BY kunden_id; RUN;\nPROC SORT DATA=bestellungen; BY kunden_id; RUN;\n\nDATA merged;\n  MERGE kunden(IN=in_k) bestellungen(IN=in_b);\n  BY kunden_id;\n  IF in_k AND in_b;  /* INNER JOIN: beide m\u00fcssen vorhanden sein */\nRUN;\n```\n\n### PySpark:\n```python\n# INNER JOIN\ndf_inner = kunden.join(\n    bestellungen,\n    on=\"kunden_id\",\n    how=\"inner\"\n)\n\n# Bei verschiedenen Spaltennamen:\ndf_inner = kunden.join(\n    bestellungen,\n    kunden[\"kunden_id\"] == bestellungen[\"k_id\"],\n    how=\"inner\"\n)\n```\n\n---\n\n## LEFT JOIN \u2013 alle Kunden, auch ohne Bestellung\n\n### SAS:\n```sas\nPROC SQL;\n  SELECT k.*, b.bestellnr, b.betrag\n  FROM kunden k\n  LEFT JOIN bestellungen b ON k.kunden_id = b.kunden_id;\nQUIT;\n```\n\n### PySpark:\n```python\ndf_left = kunden.join(bestellungen, on=\"kunden_id\", how=\"left\")\n\n# Kunden ohne Bestellung finden:\ndf_ohne_bestellung = df_left.filter(F.col(\"bestellnr\").isNull())\n```\n\n---\n\n## Anti-Join: Kunden OHNE Bestellung\n\n### SAS:\n```sas\nPROC SQL;\n  SELECT * FROM kunden k\n  WHERE NOT EXISTS (\n    SELECT 1 FROM bestellungen b\n    WHERE b.kunden_id = k.kunden_id\n  );\nQUIT;\n```\n\n### PySpark:\n```python\ndf_anti = kunden.join(bestellungen, on=\"kunden_id\", how=\"left_anti\")\n```\n\n---\n\n## Mehrere Tabellen verkn\u00fcpfen + DQ-Check nach JOIN\n\n```python\n# Nach einem JOIN: Pr\u00fcfe auf unerwartete Duplikate\ndf_join = kunden.join(bestellungen, \"kunden_id\", \"left\")\n\n# Duplikat-Check\ntotal    = df_join.count()\ndistinct = df_join.select(\"kunden_id\").distinct().count()\n\nif total != distinct:\n    print(f\"WARNUNG: {total - distinct} Duplikate durch JOIN entstanden!\")\n    print(\"Ursache: 1:N-Beziehung in Bestellungen\")\n```\n",
        exercise: {
          description: "Verbinde Kunden mit Bestellungen (LEFT JOIN). Finde dann alle Kunden ohne Bestellung (Anti-Join). Zähle wie viele Kunden mindestens eine Bestellung haben.",
          sasSolution: "DATA kunden;\n  INPUT kunden_id name $20.;\n  DATALINES;\n  1 Mueller\n  2 Schmidt\n  3 Fischer\n  4 Weber\n  ;\nRUN;\n\nDATA bestellungen;\n  INPUT kunden_id betrag;\n  DATALINES;\n  1 150.00\n  1 280.00\n  3 99.99\n  ;\nRUN;\n\n/* LEFT JOIN */\nPROC SQL;\n  SELECT k.name, b.betrag\n  FROM kunden k\n  LEFT JOIN bestellungen b ON k.kunden_id = b.kunden_id;\nQUIT;\n\n/* Anti-Join: Kunden ohne Bestellung */\nPROC SQL;\n  SELECT * FROM kunden k\n  WHERE NOT EXISTS (SELECT 1 FROM bestellungen b WHERE b.kunden_id = k.kunden_id);\nQUIT;",
          pysparkSolution: "kunden = spark.createDataFrame([(1,\"Mueller\"),(2,\"Schmidt\"),(3,\"Fischer\"),(4,\"Weber\")], [\"kunden_id\",\"name\"])\nbestellungen = spark.createDataFrame([(1,150.0),(1,280.0),(3,99.99)], [\"kunden_id\",\"betrag\"])\n\n# LEFT JOIN\nkunden.join(bestellungen, \"kunden_id\", \"left\").show()\n\n# Anti-Join\ndf_ohne = kunden.join(bestellungen, \"kunden_id\", \"left_anti\")\ndf_ohne.show()\n\nprint(\"Kunden ohne Bestellung:\", df_ohne.count())",
          hints: ["PySpark: how='left_anti' für Anti-Join", "SAS: WHERE NOT EXISTS(...) für Anti-Join", "LEFT JOIN + filter(isNull) ist eine Alternative zum Anti-Join"]

        theory: "\n## Datenbankverbindungen\n\nDas ist der Schritt von einzelnen Dateien zu echten Produktionsdatenbanken.\n\n---\n\n## SAS: LIBNAME f\u00fcr Datenbankzugriff\n\nLIBNAME ist das SAS-Konzept f\u00fcr Datenbankverbindungen. Es fungiert wie ein \"Alias\" f\u00fcr eine Datenbank oder ein Verzeichnis.\n\n### SAS-Dateien (SAS7BDAT):\n```sas\nLIBNAME mylib '/pfad/zu/daten/';  /* Verzeichnis mit .sas7bdat-Dateien */\nPROC PRINT DATA=mylib.kundendaten; RUN;\n```\n\n### Oracle-Verbindung:\n```sas\nLIBNAME oracle_db ORACLE\n  USER     = mein_user\n  PASSWORD = \"{SAS002}verschl\u00fcsselt\"  /* Nie Plaintext! */\n  PATH     = '//db-server:1521/ORCL'\n  SCHEMA   = DWH\n  PRESERVE_TAB_NAMES=YES;\n\n/* Jetzt wie normale SAS-Daten ansprechen */\nPROC SQL;\n  SELECT *\n  FROM oracle_db.kunden_tabelle\n  WHERE land = 'DE'\n  LIMIT 1000;\nQUIT;\n```\n\n### PostgreSQL via ODBC:\n```sas\nLIBNAME pgdb ODBC\n  DSN      = 'PostgreSQL_DSN'\n  USER     = db_user\n  PASSWORD = 'geheim'\n  SCHEMA   = public;\n\nDATA lokal;\n  SET pgdb.kunden;  /* Liest direkt aus PostgreSQL */\n  WHERE status = 'AKTIV';\nRUN;\n```\n\n---\n\n## PySpark: JDBC-Verbindungen\n\nJDBC ist der Standard f\u00fcr Datenbankverbindungen in der Java/Scala/Python-Welt.\n\n### PostgreSQL:\n```python\n# JDBC URL Format: jdbc:postgresql://host:port/database\njdbc_url = \"jdbc:postgresql://db-server:5432/produktion\"\n\nverbindungs_props = {\n    \"user\":     \"db_user\",\n    \"password\": \"geheim\",         # In Produktion: aus Vault / Secrets Manager!\n    \"driver\":   \"org.postgresql.Driver\"\n}\n\n# Tabelle einlesen\ndf_kunden = spark.read     .jdbc(url=jdbc_url,\n          table=\"public.kunden\",\n          properties=verbindungs_props)\n\n# Mit SQL-Filter (Predicate Pushdown \u2013 wird in DB ausgef\u00fchrt!)\ndf_aktiv = spark.read.jdbc(\n    url=jdbc_url,\n    table=\"(SELECT * FROM kunden WHERE status = 'AKTIV') AS t\",\n    properties=verbindungs_props\n)\n```\n\n### Oracle:\n```python\noracle_url = \"jdbc:oracle:thin:@//oracle-host:1521/ORCL\"\n\ndf_oracle = spark.read.jdbc(\n    url=oracle_url,\n    table=\"DWH.KUNDEN_TABELLE\",\n    properties={\n        \"user\":   \"dwh_user\",\n        \"password\": os.environ[\"DB_PASSWORD\"],  # Aus Umgebungsvariable!\n        \"driver\": \"oracle.jdbc.driver.OracleDriver\"\n    }\n)\n```\n\n### Zur\u00fcckschreiben in Datenbank:\n```python\n# Ergebnisse in DB schreiben\ndf_ergebnis.write     .jdbc(url=jdbc_url,\n          table=\"public.dq_ergebnisse\",\n          mode=\"overwrite\",        # overwrite, append, ignore, errorifexists\n          properties=verbindungs_props)\n```\n\n---\n\n## Paralleles Lesen (Performance)\n\n```python\n# F\u00fcr gro\u00dfe Tabellen: parallelisiertes Lesen \u00fcber partitionColumn\ndf_gross = spark.read.jdbc(\n    url=jdbc_url,\n    table=\"kunden\",\n    column=\"kunden_id\",       # Numerische Spalte f\u00fcr Partitionierung\n    lowerBound=1,\n    upperBound=10000000,\n    numPartitions=20,          # 20 parallele DB-Verbindungen\n    properties=verbindungs_props\n)\n```\n\n### SAS-\u00c4quivalent (parallele Verarbeitung):\n```sas\n/* SAS/CONNECT f\u00fcr parallele Verarbeitung */\nLIBNAME oracle_db ORACLE ... MULTI_DATASRC_OPT=IN_CLAUSE;\n```\n\n---\n\n## Delta Lake / Hive (moderne Data Lakehouse Architektur)\n\n```python\n# Databricks / Delta Lake\ndf = spark.read.format(\"delta\").load(\"/mnt/datalake/kunden\")\n\n# Hive Metastore\nspark.sql(\"USE dwh_datenbank\")\ndf = spark.table(\"kunden_tabelle\")  # Direkt \u00fcber Tabellennamen!\n\n# Parquet (h\u00e4ufig im Data Lake)\ndf = spark.read.parquet(\"/pfad/zu/daten/*.parquet\")\n\n# CSV mit Schema-Inferenz\ndf = spark.read.option(\"header\", True).option(\"inferSchema\", True).csv(\"/pfad/daten.csv\")\n```\n",
        exercise: {
          description: "Schreibe den Code für: 1) SAS LIBNAME für Oracle-Verbindung, 2) PySpark JDBC-Verbindung zu PostgreSQL, 3) Lese nur aktive Kunden (status='AKTIV'), 4) Schreibe DQ-Ergebnisse zurück.",
          sasSolution: "/* Oracle-Verbindung */\nLIBNAME ora_db ORACLE\n  USER     = dwh_user\n  PASSWORD = \"{SAS002}EncryptedPassword\"\n  PATH     = '//oracle-srv:1521/PROD'\n  SCHEMA   = DWH;\n\n/* Aktive Kunden lesen */\nDATA aktive_kunden;\n  SET ora_db.kunden;\n  WHERE status = 'AKTIV';\nRUN;\n\n/* DQ-Pr\u00fcfung */\nDATA dq_results;\n  SET aktive_kunden;\n  hat_problem = (name = '' OR PRXMATCH('/[^a-zA-Z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\\s\\-]/', name) > 0);\nRUN;\n\n/* Zur\u00fcckschreiben */\nDATA ora_db.dq_ergebnisse;\n  SET dq_results;\n  WHERE hat_problem = 1;\nRUN;",
          pysparkSolution: "import os\n\njdbc_url = \"jdbc:postgresql://db-server:5432/produktion\"\nprops = {\n    \"user\": \"db_user\",\n    \"password\": os.environ.get(\"DB_PASSWORD\", \"geheim\"),\n    \"driver\": \"org.postgresql.Driver\"\n}\n\n# Aktive Kunden lesen\ndf_aktiv = spark.read.jdbc(\n    url=jdbc_url,\n    table=\"(SELECT * FROM kunden WHERE status = 'AKTIV') AS t\",\n    properties=props\n)\n\n# DQ-Pr\u00fcfung\nUNERLAUBT = r\"[^a-zA-Z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\\s\\-'\\.]\"\ndf_dq = df_aktiv.withColumn(\"hat_problem\", F.col(\"name\").rlike(UNERLAUBT))\n\n# Probleme zur\u00fcckschreiben\ndf_dq.filter(F.col(\"hat_problem\"))     .write.jdbc(url=jdbc_url, table=\"dq_ergebnisse\", mode=\"overwrite\", properties=props)",

        theory: "\n## Performance-Optimierung\n\n### SAS Performance-Tipps:\n\n```sas\n/* 1. Nur ben\u00f6tigte Spalten einlesen (KEEP/DROP) */\nDATA schlank;\n  SET grosses_dataset (KEEP=kunden_id name status betrag);\nRUN;\n\n/* 2. Fr\u00fch filtern mit WHERE (nicht IF!) */\nDATA gefiltert;\n  SET grosses_dataset;\n  WHERE status = 'AKTIV';  /* WHERE: filtert beim Einlesen */\n  /* IF status = 'AKTIV'; */ /* IF: liest alles, dann filtert */\nRUN;\n\n/* 3. Indexe nutzen */\nPROC DATASETS LIBRARY=mylib NOLIST;\n  MODIFY kunden;\n    INDEX CREATE kunden_id / UNIQUE;\n    INDEX CREATE (name status); /* Kompositindex */\nQUIT;\n\n/* 4. PROC SQL: Hints f\u00fcr Optimizer */\nPROC SQL;\n  SELECT /*+ NOREMERGE */ k.*, b.betrag\n  FROM kunden k\n  LEFT JOIN bestellungen b ON k.id = b.kunden_id;\nQUIT;\n```\n\n---\n\n### PySpark Performance-Tipps:\n\n```python\n# 1. Caching f\u00fcr mehrfach genutzte DataFrames\ndf_kunden.cache()         # Im Arbeitsspeicher cachen\ndf_kunden.persist()       # Wie cache(), aber konfigurierbar\n\n# Nicht mehr ben\u00f6tigt? Cache freigeben!\ndf_kunden.unpersist()\n\n# 2. Predicate Pushdown \u2013 Filter so fr\u00fch wie m\u00f6glich!\n# SCHLECHT:\ndf_alle = spark.read.jdbc(url, \"kunden\", properties=props)\ndf_aktiv = df_alle.filter(F.col(\"status\") == \"AKTIV\")\n\n# GUT: Filter in JDBC-Query einbauen\ndf_aktiv = spark.read.jdbc(\n    url,\n    \"(SELECT * FROM kunden WHERE status = 'AKTIV') AS t\",\n    properties=props\n)\n\n# 3. Partitionierung pr\u00fcfen\ndf.rdd.getNumPartitions()  # Wie viele Partitionen?\n\n# Repartitionieren f\u00fcr bessere Parallelisierung\ndf_optimal = df.repartition(200)        # Nach Anzahl\ndf_by_key  = df.repartition(\"land\")    # Nach Spalte (f\u00fcr sp\u00e4tere GroupBy)\n\n# 4. Broadcast-Join f\u00fcr kleine Lookup-Tabellen\nfrom pyspark.sql.functions import broadcast\n\ndf_result = df_gross.join(\n    broadcast(df_klein),   # Klein-Tabelle wird zu allen Nodes gesendet\n    on=\"key\"\n)\n\n# 5. Explain \u2013 Query-Plan analysieren\ndf.explain(True)  # Zeigt physischen und logischen Plan\n```\n\n---\n\n## Debugging & Logging\n\n### SAS:\n```sas\n/* SAS Log analysieren */\nOPTIONS MPRINT MLOGIC SYMBOLGEN;  /* Mehr Detail im Log */\n\n/* Zeilenanzahl pr\u00fcfen */\n%LET n = %SYSFUNC(OPEN(mylib.kunden));\n%PUT Zeilenanzahl: %SYSFUNC(ATTRN(&n, NOBS));\n%LET rc = %SYSFUNC(CLOSE(&n));\n\n/* Laufzeit messen */\n%LET start = %SYSFUNC(DATETIME());\n/* ... Code ... */\n%PUT Laufzeit: %SYSEVALF(%SYSFUNC(DATETIME()) - &start) Sekunden;\n```\n\n### PySpark:\n```python\nimport logging\nimport time\n\n# Logging einrichten\nlogging.basicConfig(level=logging.INFO)\nlogger = logging.getLogger(__name__)\n\n# Laufzeit messen\nstart = time.time()\ndf_result = df.groupBy(\"abteilung\").count()\ndf_result.cache().count()  # Action triggern = tats\u00e4chlich ausf\u00fchren!\nelapsed = time.time() - start\nlogger.info(f\"Aggregation dauerte {elapsed:.2f}s f\u00fcr {df.count():,} Zeilen\")\n\n# DataFrame-Info\nprint(f\"Schema:      {df.schema}\")\nprint(f\"Partitionen: {df.rdd.getNumPartitions()}\")\nprint(f\"Zeilen:      {df.count():,}\")\n\n# Stichprobe\ndf.sample(fraction=0.01).show(20)\n```\n\n---\n\n## Vollst\u00e4ndige DQ-Pipeline \u2013 Produktionsreif\n\n```python\nfrom pyspark.sql import SparkSession, functions as F\nfrom pyspark.sql.window import Window\nimport logging\n\ndef run_dq_pipeline(spark, input_table, output_table, jdbc_url, props):\n    \"\"\"Vollst\u00e4ndige, produktionsreife DQ-Pipeline f\u00fcr Namenspr\u00fcfung.\"\"\"\n    \n    logger = logging.getLogger(\"DQ_Pipeline\")\n    logger.info(f\"Start DQ-Pipeline f\u00fcr {input_table}\")\n    \n    # 1. Daten laden\n    df = spark.read.jdbc(url=jdbc_url, table=input_table, properties=props)\n    total = df.count()\n    logger.info(f\"  Geladen: {total:,} Zeilen\")\n    \n    # 2. DQ-Regeln definieren\n    REGEX_NAME = r\"[^a-zA-Z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\u00e0\u00e1\u00e2\u00e3\u00e8\u00e9\u00ea\u00eb\u00ec\u00ed\u00ee\u00ef\u00f9\u00fa\u00fb\u00fd\u00c0\u00c1\u00c2\u00c3\u00c8\u00c9\u00ca\u00cb\u00cc\u00cd\u00ce\u00cf\u00d9\u00da\u00db\u00dd\\s\\-'\\.]\"\n    \n    df_dq = df         .withColumn(\"dq_name_leer\",\n            F.col(\"name\").isNull() | (F.trim(F.col(\"name\")) == \"\"))         .withColumn(\"dq_name_sonderzeichen\",\n            (~F.col(\"name\").isNull()) & F.col(\"name\").rlike(REGEX_NAME))         .withColumn(\"dq_name_leerzeichen\",\n            F.col(\"name\") != F.trim(F.col(\"name\")))         .withColumn(\"dq_name_doppelspace\",\n            F.col(\"name\").rlike(r\"  \"))         .withColumn(\"dq_fehler_anzahl\",\n            F.col(\"dq_name_leer\").cast(\"int\") +\n            F.col(\"dq_name_sonderzeichen\").cast(\"int\") +\n            F.col(\"dq_name_leerzeichen\").cast(\"int\") +\n            F.col(\"dq_name_doppelspace\").cast(\"int\")\n        )         .withColumn(\"dq_status\",\n            F.when(F.col(\"dq_fehler_anzahl\") == 0, \"OK\").otherwise(\"FEHLER\")\n        )\n    \n    # 3. Statistik loggen\n    fehler = df_dq.filter(F.col(\"dq_status\") == \"FEHLER\").count()\n    logger.info(f\"  Fehler: {fehler:,} ({fehler/total*100:.1f}%)\")\n    \n    # 4. Ergebnis speichern\n    df_dq.write.jdbc(url=jdbc_url, table=output_table, mode=\"overwrite\", properties=props)\n    logger.info(f\"  Geschrieben nach {output_table}\")\n    \n    return df_dq\n```\n",
        exercise: {
          description: "Baue eine vollständige DQ-Pipeline: 1) Daten laden, 2) Mehrere DQ-Checks (Name leer, Sonderzeichen, Leerzeichen), 3) DQ-Score berechnen, 4) Ergebnis-Statistik ausgeben.",
          sasSolution: "/* DQ-Pipeline in SAS */\nDATA dq_pipeline;\n  SET kundendaten;\n  \n  /* DQ-Checks */\n  dq_name_leer         = (name = '');\n  dq_name_sonderzeichen = (PRXMATCH('/[^a-zA-Z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\\s\\-\\'\\.]/', STRIP(name)) > 0);\n  dq_name_leerzeichen   = (name NE STRIP(name));\n  dq_name_doppelspace   = (INDEX(name, '  ') > 0);\n  \n  /* DQ-Score */\n  dq_fehler_anzahl = dq_name_leer + dq_name_sonderzeichen \n                   + dq_name_leerzeichen + dq_name_doppelspace;\n  \n  IF dq_fehler_anzahl = 0 THEN dq_status = 'OK';\n  ELSE dq_status = 'FEHLER';\nRUN;\n\nPROC FREQ DATA=dq_pipeline;\n  TABLES dq_status dq_name_sonderzeichen dq_name_leer;\nRUN;",

      {
        "id": "l8_1",
        "title": "Pipeline-Design: SAP → Data Warehouse",
        "theory": "## ETL/ELT im Energiesektor\n\nBei Vattenfall fließen täglich Daten aus **SAP IS-U** (Kundensystem), **Zählermanagementsystemen** und **Marktkommunikation** in ein zentrales Data Warehouse. Ohne stabile Pipelines geht nichts.\n\n---\n\n## ETL vs. ELT\n\n| Ansatz | Wann? | Vorteil |\n|--------|-------|---------|\n| **ETL** | SAS-basierte DWH | Transform vor dem Laden |\n| **ELT** | Lakehouse/Spark | Rohdata laden, später transformieren |\n\n---\n\n## Pipeline-Struktur (Vattenfall-typisch)\n\n```\nSAP IS-U\n  ↓  (JDBC / Flat File)\nStaging Layer   ← Rohdaten, unverändert\n  ↓  (DQ-Checks)\nCore Layer      ← Bereinigt, validiert\n  ↓  (Business Rules)\nMart Layer      ← Aggregiert für Reports\n```\n\n---\n\n## SAS: Makro-gesteuerte ETL-Pipeline\n\n```sas\n/* ============================================\n   MAKRO: Generische ETL-Pipeline mit Logging\n   ============================================ */\n%MACRO run_etl(src=, tgt=, filter=);\n  %PUT INFO: Start ETL &src -> &tgt (&SYSDATE &SYSTIME);\n\n  /* 1. Laden */\n  DATA work.staging;\n    SET &src;\n    %IF &filter NE %STR() %THEN %DO;\n      WHERE &filter;\n    %END;\n    load_ts = DATETIME();  /* Ladezeitstempel */\n  RUN;\n\n  /* 2. DQ-Check */\n  DATA work.valid work.rejected;\n    SET work.staging;\n    IF MISSING(vertragsnr) OR MISSING(kundennr)\n      THEN OUTPUT work.rejected;\n      ELSE OUTPUT work.valid;\n  RUN;\n\n  /* 3. Logging */\n  PROC SQL;\n    INSERT INTO etl_log VALUES (\n      \"&src\", \"&tgt\", DATETIME(),\n      (SELECT COUNT(*) FROM work.valid),\n      (SELECT COUNT(*) FROM work.rejected)\n    );\n  QUIT;\n\n  /* 4. In Zieltabelle laden */\n  PROC APPEND BASE=&tgt DATA=work.valid; RUN;\n\n  %PUT INFO: ETL fertig. Valid=%NOBS(work.valid) Rejected=%NOBS(work.rejected);\n%MEND;\n\n/* Aufruf */\n%run_etl(\n  src    = sap.sap_kunden,\n  tgt    = dwh.kunden_core,\n  filter = %STR(buchungsdatum >= '01JAN2025'd)\n);\n```\n\n---\n\n## PySpark: Robuste ETL-Pipeline mit Fehlerbehandlung\n\n```python\nfrom pyspark.sql import functions as F\nfrom pyspark.sql.types import *\nfrom datetime import datetime\nimport logging\n\nlogging.basicConfig(level=logging.INFO)\nlog = logging.getLogger(\"ETL\")\n\ndef run_etl_pipeline(spark, src_table, tgt_table, filter_expr=None):\n    \"\"\"\n    Generische ETL-Pipeline: Staging → Core\n    Rückgabe: dict mit Metriken\n    \"\"\"\n    metrics = {\"start\": datetime.now(), \"status\": \"OK\"}\n\n    try:\n        # 1. Laden aus Quelle\n        log.info(f\"Lade {src_table}...\")\n        df = spark.table(src_table)\n        if filter_expr:\n            df = df.filter(filter_expr)\n        metrics[\"source_count\"] = df.count()\n\n        # 2. Staging: Ladezeitstempel hinzufügen\n        df = df.withColumn(\"load_ts\", F.current_timestamp())                .withColumn(\"src_system\", F.lit(src_table))\n\n        # 3. DQ-Split: valid vs. rejected\n        df_valid    = df.filter(F.col(\"vertragsnr\").isNotNull() &\n                                F.col(\"kundennr\").isNotNull())\n        df_rejected = df.filter(F.col(\"vertragsnr\").isNull() |\n                                F.col(\"kundennr\").isNull())\n\n        metrics[\"valid_count\"]    = df_valid.count()\n        metrics[\"rejected_count\"] = df_rejected.count()\n\n        # 4. Rejected loggen\n        if metrics[\"rejected_count\"] > 0:\n            log.warning(f\"{metrics['rejected_count']} Datensätze abgelehnt\")\n            df_rejected.write.mode(\"append\").saveAsTable(\"etl_rejects\")\n\n        # 5. In Ziel schreiben (append)\n        df_valid.write.mode(\"append\").saveAsTable(tgt_table)\n\n        log.info(f\"ETL OK: {metrics['valid_count']} Datensätze geladen\")\n\n    except Exception as e:\n        metrics[\"status\"] = \"ERROR\"\n        metrics[\"error\"]  = str(e)\n        log.error(f\"ETL FEHLER: {e}\")\n        raise\n\n    finally:\n        metrics[\"end\"] = datetime.now()\n        metrics[\"duration_s\"] = (metrics[\"end\"] - metrics[\"start\"]).seconds\n        # In Log-Tabelle schreiben\n        log_df = spark.createDataFrame([metrics])\n        log_df.write.mode(\"append\").saveAsTable(\"etl_run_log\")\n\n    return metrics\n\n# Aufruf\nresult = run_etl_pipeline(\n    spark,\n    src_table   = \"sap_raw.kunden\",\n    tgt_table   = \"dwh_core.kunden\",\n    filter_expr = \"buchungsdatum >= '2025-01-01'\"\n)\nprint(result)\n```\n\n**Wichtig für Produktion:** Immer `try/except/finally` — damit auch bei Fehlern das Log geschrieben wird.",
        "exercise": {
          "description": "Baue eine ETL-Pipeline die Zählerdaten lädt, DQ-prüft (zähler_id und verbrauch_kwh dürfen nicht null sein), valid/rejected trennt und eine Statistik ausgibt.",
          "sasSolution": "/* ETL für Zählerdaten */\n%MACRO etl_zaehler(src=, tgt=);\n  %PUT INFO: Starte ETL &SYSDATE;\n\n  DATA work.valid work.rejected;\n    SET &src;\n    IF MISSING(zaehler_id) OR MISSING(verbrauch_kwh) OR verbrauch_kwh < 0\n      THEN OUTPUT work.rejected;\n      ELSE OUTPUT work.valid;\n  RUN;\n\n  PROC APPEND BASE=&tgt DATA=work.valid; RUN;\n\n  PROC SQL;\n    SELECT 'Valid'    AS status, COUNT(*) AS anzahl FROM work.valid\n    UNION ALL\n    SELECT 'Rejected' AS status, COUNT(*) AS anzahl FROM work.rejected;\n  QUIT;\n%MEND;\n\n%etl_zaehler(src=raw.zaehler_eingang, tgt=core.zaehler_clean);",
          "pysparkSolution": "from pyspark.sql import functions as F\nimport logging\nlog = logging.getLogger('ETL')\n\ndef etl_zaehler(spark, src, tgt):\n    df = spark.table(src)\n    \n    valid    = df.filter(F.col('zaehler_id').isNotNull() &\n                         F.col('verbrauch_kwh').isNotNull() &\n                         (F.col('verbrauch_kwh') >= 0))\n    rejected = df.subtract(valid)\n    \n    valid.write.mode('append').saveAsTable(tgt)\n    \n    print('Valid:   ', valid.count())\n    print('Rejected:', rejected.count())\n    \n    if rejected.count() > 0:\n        rejected.write.mode('append').saveAsTable('etl_rejects')\n        log.warning(f'{rejected.count()} fehlerhafte Einträge')\n\netl_zaehler(spark, 'raw.zaehler_eingang', 'core.zaehler_clean')",
          "hints": [
            "MISSING() in SAS prüft auf fehlende Werte (NULL + leer)",
            "In PySpark: .isNotNull() & (F.col('x') >= 0) für kombinierte Checks",
            "PROC APPEND fügt Daten ohne Duplikat-Check hinzu — schnell für inkrementelle Loads"
          ]

        "id": "l8_2",
        "title": "Inkrementelle Loads & Upserts (MERGE)",
        "theory": "## Das Problem: Täglich neue Daten\n\nVattenfall hat Millionen Kundendatensätze. Jeden Tag kommen neue Verträge dazu, bestehende werden geändert. Du kannst nicht jeden Tag alles neu laden — das dauert Stunden.\n\n**Lösung: Inkrementelle Loads mit MERGE/UPSERT**\n\n```\nNeue Daten (Delta)\n        ↓\n   Schon vorhanden?\n    ↙          ↘\n  UPDATE      INSERT\n(bestehend)   (neu)\n```\n\n---\n\n## SAS: PROC SQL MERGE / UPDATE\n\n```sas\n/* ============================================\n   UPSERT: Neue Kundendaten in Core einpflegen\n   Quelle: sap_delta (nur geänderte Sätze)\n   Ziel:   dwh.kunden_core\n   ============================================ */\n\n/* Schritt 1: Updates identifizieren */\nPROC SQL;\n  UPDATE dwh.kunden_core AS t\n  SET\n    adresse      = s.adresse,\n    tarif        = s.tarif,\n    geaendert_am = s.geaendert_am\n  FROM sap_delta AS s\n  WHERE t.kundennr = s.kundennr;      /* Match-Bedingung */\nQUIT;\n\n/* Schritt 2: Neue Kunden einfügen (die noch nicht existieren) */\nPROC SQL;\n  INSERT INTO dwh.kunden_core\n  SELECT s.*\n  FROM sap_delta AS s\n  LEFT JOIN dwh.kunden_core AS t ON s.kundennr = t.kundennr\n  WHERE t.kundennr IS NULL;           /* Nur wirklich neue */\nQUIT;\n\n/* Schritt 3: Statistik */\n%PUT INFO: Delta enthält %NOBS(sap_delta) Sätze;\n%PUT INFO: Kunden Core jetzt: %NOBS(dwh.kunden_core) Sätze;\n```\n\n---\n\n## PySpark: MERGE INTO (Delta Lake)\n\n```python\n# MERGE INTO — der Goldstandard für Upserts im Lakehouse\n# Benötigt Delta Lake (Standard in Databricks/Azure Synapse)\n\nfrom delta.tables import DeltaTable\n\n# Ziel-Tabelle als Delta-Objekt laden\nkunden_core = DeltaTable.forName(spark, \"dwh.kunden_core\")\n\n# Delta (neue/geänderte Sätze aus SAP)\nsap_delta = spark.table(\"sap_raw.kunden_delta\")     .filter(\"extraction_date = current_date()\")\n\n# MERGE: Update wenn vorhanden, Insert wenn neu\nkunden_core.alias(\"ziel\").merge(\n    sap_delta.alias(\"quelle\"),\n    \"ziel.kundennr = quelle.kundennr\"          # Match-Bedingung\n) .whenMatchedUpdate(values={                    # UPDATE bei Match\n    \"adresse\":      \"quelle.adresse\",\n    \"tarif\":        \"quelle.tarif\",\n    \"geaendert_am\": \"quelle.geaendert_am\",\n    \"updated_ts\":   \"current_timestamp()\"\n}) .whenNotMatchedInsertAll() \\                   # INSERT wenn neu\n.execute()\n\n# Statistik\nprint(kunden_core.history(1).select(\n    \"operationMetrics\"\n).collect()[0][0])\n# → {'numUpdatedRows': '142', 'numInsertedRows': '37', ...}\n```\n\n---\n\n## Inkrementelle Load-Strategie: Wasserzeichen\n\n```python\n# Nur neue Daten seit dem letzten Run laden\n# Wasserzeichen = letzter Ladezeitstempel\n\ndef get_watermark(spark, tabelle):\n    \"\"\"Letzten Ladezeitstempel aus Log holen.\"\"\"\n    row = spark.sql(f\"\"\"\n        SELECT MAX(load_ts) as wm\n        FROM etl_run_log\n        WHERE target_table = '{tabelle}'\n          AND status = 'OK'\n    \"\"\").first()\n    return row.wm or \"1900-01-01\"\n\ndef inkrementell_laden(spark, quelle, ziel, ts_spalte=\"geaendert_am\"):\n    watermark = get_watermark(spark, ziel)\n    print(f\"Lade alles nach {watermark}...\")\n\n    df_delta = spark.table(quelle).filter(\n        f\"{ts_spalte} > '{watermark}'\"\n    )\n    print(f\"  → {df_delta.count()} neue/geänderte Sätze\")\n    return df_delta\n\n# Jeden Tag nur die Delta-Sätze verarbeiten\ndelta = inkrementell_laden(spark, \"sap_raw.kunden\", \"dwh.kunden_core\")\n```",
        "exercise": {
          "description": "Implementiere einen Upsert: Eine neue Tabelle tarif_updates enthält geänderte Tarife. Aktualisiere bestehende Kunden in kunden_core und füge neue ein.",
          "sasSolution": "/* Schritt 1: Bestehende updaten */\nPROC SQL;\n  UPDATE dwh.kunden_core AS t\n  SET tarif = s.neuer_tarif,\n      tarif_ab = s.gueltig_ab\n  FROM tarif_updates AS s\n  WHERE t.kundennr = s.kundennr;\nQUIT;\n\n/* Schritt 2: Neue einfügen */\nPROC SQL;\n  INSERT INTO dwh.kunden_core\n  SELECT s.kundennr, s.neuer_tarif AS tarif, s.gueltig_ab AS tarif_ab\n  FROM tarif_updates AS s\n  WHERE s.kundennr NOT IN (SELECT kundennr FROM dwh.kunden_core);\nQUIT;\n\n%PUT Upsert abgeschlossen: %NOBS(dwh.kunden_core) Kunden total;",
          "pysparkSolution": "from delta.tables import DeltaTable\n\nkunden = DeltaTable.forName(spark, 'dwh.kunden_core')\ntarif_updates = spark.table('tarif_updates')\n\nkunden.alias('ziel').merge(\n    tarif_updates.alias('neu'),\n    'ziel.kundennr = neu.kundennr'\n).whenMatchedUpdate(values={\n    'tarif':    'neu.neuer_tarif',\n    'tarif_ab': 'neu.gueltig_ab'\n}).whenNotMatchedInsert(values={\n    'kundennr': 'neu.kundennr',\n    'tarif':    'neu.neuer_tarif',\n    'tarif_ab': 'neu.gueltig_ab'\n}).execute()\n\nprint('Fertig:', kunden.history(1).select('operationMetrics').first()[0])",

        "title": "Slowly Changing Dimensions: Tarifhistorie",
        "theory": "## Warum SCD? Das Vattenfall-Problem\n\nEin Kunde wechselt am 1. März von Tarif A zu Tarif B. Du willst für Januar die Rechnung mit Tarif A berechnen, für April mit Tarif B. Ohne Historisierung ist der alte Tarif weg.\n\n**SCD Typ 2 löst das:** Jede Änderung erzeugt eine neue Zeile mit Gültigkeitszeitraum.\n\n---\n\n## Die 3 SCD-Typen\n\n| Typ | Strategie | Wann? |\n|-----|-----------|-------|\n| **Typ 1** | Überschreiben | Tippfehler-Korrektur |\n| **Typ 2** | Neue Zeile | Tarif-, Adressänderung |\n| **Typ 3** | Neue Spalte | Nur \"vorheriger Wert\" |\n\n---\n\n## SCD Typ 2 – Tabellenstruktur\n\n```\nkundennr | tarif    | gueltig_von | gueltig_bis  | is_aktuell\n---------|----------|-------------|--------------|----------\nK001     | Basis    | 2023-01-01  | 2025-02-28   | 0\nK001     | Premium  | 2025-03-01  | 9999-12-31   | 1  ← aktuell\nK002     | Öko      | 2024-06-01  | 9999-12-31   | 1\n```\n\nDas Datum `9999-12-31` bedeutet \"noch gültig\" — Standard in DWH.\n\n---\n\n## SAS: SCD Typ 2 implementieren\n\n```sas\n/* ============================================\n   SCD Typ 2: Tarifwechsel historisieren\n   ============================================ */\n\n/* Schritt 1: Geänderte Datensätze finden */\nPROC SQL;\n  CREATE TABLE work.geaendert AS\n  SELECT\n    n.kundennr,\n    n.tarif      AS neuer_tarif,\n    n.gueltig_ab AS neues_datum\n  FROM sap_delta AS n\n  INNER JOIN dwh.kunden_scd2 AS a\n    ON n.kundennr = a.kundennr\n    AND a.is_aktuell = 1             /* Nur aktuellen Record prüfen */\n  WHERE n.tarif NE a.tarif;          /* Tarif hat sich geändert */\nQUIT;\n\n/* Schritt 2: Alten Record schließen */\nPROC SQL;\n  UPDATE dwh.kunden_scd2\n  SET\n    gueltig_bis = INTNX('DAY', geaendert.neues_datum, -1, 'B'),\n    is_aktuell  = 0\n  FROM work.geaendert\n  WHERE kunden_scd2.kundennr = geaendert.kundennr\n    AND kunden_scd2.is_aktuell = 1;\nQUIT;\n\n/* Schritt 3: Neuen Record einfügen */\nPROC SQL;\n  INSERT INTO dwh.kunden_scd2\n  SELECT\n    kundennr,\n    neuer_tarif     AS tarif,\n    neues_datum     AS gueltig_von,\n    '31DEC9999'd    AS gueltig_bis,\n    1               AS is_aktuell\n  FROM work.geaendert;\nQUIT;\n\n/* Historische Abfrage: Welchen Tarif hatte K001 am 15. Feb 2025? */\nPROC SQL;\n  SELECT kundennr, tarif\n  FROM dwh.kunden_scd2\n  WHERE kundennr = 'K001'\n    AND '15FEB2025'd BETWEEN gueltig_von AND gueltig_bis;\nQUIT;\n```\n\n---\n\n## PySpark + Delta: SCD Typ 2 mit MERGE\n\n```python\nfrom delta.tables import DeltaTable\nfrom pyspark.sql import functions as F\n\nkunden_scd2 = DeltaTable.forName(spark, \"dwh.kunden_scd2\")\nsap_delta   = spark.table(\"sap_raw.kunden_delta\")\n\n# Nur wirklich geänderte Tarife\naenderungen = sap_delta.alias(\"n\").join(\n    kunden_scd2.toDF().filter(\"is_aktuell = 1\").alias(\"a\"),\n    \"kundennr\"\n).filter(\"n.tarif != a.tarif\")  .select(\"n.kundennr\", \"n.tarif\", \"n.gueltig_ab\")\n\n# Schritt 1: Alte Records schließen\nkunden_scd2.alias(\"scd\").merge(\n    aenderungen.alias(\"neu\"),\n    \"scd.kundennr = neu.kundennr AND scd.is_aktuell = 1\"\n).whenMatchedUpdate(values={\n    \"gueltig_bis\": F.date_sub(F.col(\"neu.gueltig_ab\"), 1),\n    \"is_aktuell\":  F.lit(0)\n}).execute()\n\n# Schritt 2: Neue Records einfügen\nneue_zeilen = aenderungen.select(\n    \"kundennr\",\n    F.col(\"tarif\").alias(\"tarif\"),\n    F.col(\"gueltig_ab\").alias(\"gueltig_von\"),\n    F.lit(\"9999-12-31\").cast(\"date\").alias(\"gueltig_bis\"),\n    F.lit(1).alias(\"is_aktuell\")\n)\nneue_zeilen.write.mode(\"append\").saveAsTable(\"dwh.kunden_scd2\")\n\n# Historische Abfrage: Welchen Tarif hatte K001 am 15. Feb 2025?\nspark.sql(\"\"\"\n  SELECT kundennr, tarif\n  FROM dwh.kunden_scd2\n  WHERE kundennr = 'K001'\n    AND '2025-02-15' BETWEEN gueltig_von AND gueltig_bis\n\"\"\").show()\n```",
        "exercise": {
          "description": "Implementiere SCD Typ 2 für Adressänderungen: Eine Tabelle adress_updates enthält neue Adressen mit gueltig_ab. Schließe alte Adress-Records und füge neue ein.",
          "sasSolution": "/* SCD2 Adressänderungen */\n\n/* 1. Alte Records schließen */\nPROC SQL;\n  UPDATE dwh.kunden_adressen_scd2 AS t\n  SET gueltig_bis = INTNX('DAY', s.gueltig_ab, -1, 'B'),\n      is_aktuell  = 0\n  FROM adress_updates AS s\n  WHERE t.kundennr = s.kundennr\n    AND t.is_aktuell = 1;\nQUIT;\n\n/* 2. Neue Records einfügen */\nPROC SQL;\n  INSERT INTO dwh.kunden_adressen_scd2\n  SELECT\n    kundennr, neue_adresse AS adresse,\n    gueltig_ab AS gueltig_von,\n    '31DEC9999'd AS gueltig_bis,\n    1 AS is_aktuell\n  FROM adress_updates;\nQUIT;\n\n/* 3. Aktuelle Adressen anzeigen */\nPROC SQL;\n  SELECT * FROM dwh.kunden_adressen_scd2\n  WHERE is_aktuell = 1;\nQUIT;",
          "pysparkSolution": "from delta.tables import DeltaTable\nfrom pyspark.sql import functions as F\n\nadressen = DeltaTable.forName(spark, 'dwh.kunden_adressen_scd2')\nupdates  = spark.table('adress_updates')\n\n# 1. Alte Records schließen\nadressen.alias('t').merge(\n    updates.alias('s'),\n    't.kundennr = s.kundennr AND t.is_aktuell = 1'\n).whenMatchedUpdate(values={\n    'gueltig_bis': F.date_sub(F.col('s.gueltig_ab'), 1),\n    'is_aktuell': F.lit(0)\n}).execute()\n\n# 2. Neue Records einfügen\nneu = updates.select(\n    'kundennr',\n    F.col('neue_adresse').alias('adresse'),\n    F.col('gueltig_ab').alias('gueltig_von'),\n    F.lit('9999-12-31').cast('date').alias('gueltig_bis'),\n    F.lit(1).alias('is_aktuell')\n)\nneu.write.mode('append').saveAsTable('dwh.kunden_adressen_scd2')\n\nprint('Aktuelle Adressen:', adressen.toDF().filter('is_aktuell=1').count())",
          "hints": [

            "date_sub(col, 1) macht dasselbe in PySpark",

        "id": "l10_1",
        "title": "15-Minuten-Zählerdaten verarbeiten",
        "theory": "## Smart Meter im Energiesektor\n\nVattenfall hat Millionen von Smart Metern. Jeder sendet alle **15 Minuten** einen Zählerstand — das sind **96 Werte pro Tag, pro Zähler**. Bei 500.000 Zählern = **48 Millionen Zeilen täglich**.\n\n---\n\n## Typische Datenstruktur\n\n```\nzaehler_id | messzeitpunkt       | verbrauch_kwh | qualitaet\n-----------|---------------------|---------------|----------\nZ001       | 2025-01-01 00:00    | 0.42          | OK\nZ001       | 2025-01-01 00:15    | 0.38          | OK\nZ001       | 2025-01-01 00:30    | NULL           | MISSING\nZ001       | 2025-01-01 00:45    | 0.51          | OK\n```\n\n---\n\n## SAS: Zeitreihen aggregieren & Lücken füllen\n\n```sas\n/* ============================================\n   Tagessummen + fehlende Werte behandeln\n   ============================================ */\n\n/* 1. Tagessumme pro Zähler */\nPROC SQL;\n  CREATE TABLE tages_verbrauch AS\n  SELECT\n    zaehler_id,\n    DATEPART(messzeitpunkt) AS messtag FORMAT=DATE9.,\n    COUNT(*)                AS messungen_gesamt,\n    SUM(CASE WHEN verbrauch_kwh IS NULL THEN 1 ELSE 0 END) AS luecken,\n    SUM(verbrauch_kwh)      AS verbrauch_kwh_tag,\n    /* Vollständigkeitsgrad */\n    ROUND(\n      (COUNT(*) - SUM(CASE WHEN verbrauch_kwh IS NULL THEN 1 ELSE 0 END))\n      / 96 * 100, 1\n    ) AS vollstaendigkeit_pct\n  FROM raw.zaehler_15min\n  GROUP BY zaehler_id, DATEPART(messzeitpunkt);\nQUIT;\n\n/* 2. Fehlende Werte: Interpolation mit Nachbarn */\nDATA zaehler_interpoliert;\n  SET raw.zaehler_15min;\n  BY zaehler_id messzeitpunkt;\n\n  RETAIN letzter_wert;\n\n  IF verbrauch_kwh = . THEN DO;\n    verbrauch_kwh = letzter_wert;  /* Vorwärts-Fortschreibung */\n    qualitaet = 'IMPUTED';\n  END;\n  ELSE letzter_wert = verbrauch_kwh;\nRUN;\n\n/* 3. Anomalie-Erkennung: > 3x Tagesdurchschnitt */\nPROC SQL;\n  CREATE TABLE anomalien AS\n  SELECT z.*,\n    z.verbrauch_kwh / AVG(z.verbrauch_kwh)\n      OVER (PARTITION BY z.zaehler_id\n            ORDER BY z.messzeitpunkt\n            ROWS BETWEEN 96 PRECEDING AND CURRENT ROW)\n    AS abweichung_faktor\n  FROM zaehler_15min AS z\n  HAVING abweichung_faktor > 3;\nQUIT;\n```\n\n---\n\n## PySpark: Smart Meter Aggregation in großem Maßstab\n\n```python\nfrom pyspark.sql import functions as F\nfrom pyspark.sql.window import Window\n\n# 1. Tagessummen (läuft auf 48M Zeilen in Minuten dank Spark)\ntages_verbrauch = spark.table(\"raw.zaehler_15min\")     .withColumn(\"messtag\", F.to_date(\"messzeitpunkt\"))     .groupBy(\"zaehler_id\", \"messtag\")     .agg(\n        F.count(\"*\").alias(\"messungen\"),\n        F.sum(\"verbrauch_kwh\").alias(\"verbrauch_kwh_tag\"),\n        F.sum(F.col(\"verbrauch_kwh\").isNull().cast(\"int\")).alias(\"luecken\"),\n        F.round(\n            (F.count(\"*\") - F.sum(F.col(\"verbrauch_kwh\").isNull().cast(\"int\")))\n            / 96 * 100, 1\n        ).alias(\"vollstaendigkeit_pct\")\n    )\n\n# 2. Fehlende Werte: Forward Fill mit Window-Funktion\nw = Window.partitionBy(\"zaehler_id\").orderBy(\"messzeitpunkt\")           .rowsBetween(Window.unboundedPreceding, Window.currentRow)\n\ndf_filled = spark.table(\"raw.zaehler_15min\")     .withColumn(\n        \"verbrauch_filled\",\n        F.last(\"verbrauch_kwh\", ignorenulls=True).over(w)\n    )     .withColumn(\n        \"qualitaet\",\n        F.when(F.col(\"verbrauch_kwh\").isNull(), \"IMPUTED\")\n         .otherwise(F.col(\"qualitaet\"))\n    )\n\n# 3. Anomalie-Erkennung: Rollierender 24h-Durchschnitt\nw_rolling = Window.partitionBy(\"zaehler_id\")                   .orderBy(\"messzeitpunkt\")                   .rowsBetween(-96, 0)   # letzte 24h (96 x 15min)\n\nanomalien = df_filled     .withColumn(\"rolling_avg\",\n        F.avg(\"verbrauch_kwh\").over(w_rolling)\n    )     .withColumn(\"abweichung\",\n        F.col(\"verbrauch_kwh\") / F.col(\"rolling_avg\")\n    )     .filter(F.col(\"abweichung\") > 3)\n\nprint(f\"Anomalien gefunden: {anomalien.count()}\")\nanomalien.select(\"zaehler_id\", \"messzeitpunkt\",\n                 \"verbrauch_kwh\", \"abweichung\").show(10)\n```\n\n---\n\n## Partitionierung für Performance\n\n```python\n# Zeitreihendaten IMMER nach Datum partitionieren!\n# Sonst liest Spark bei Tages-Abfragen die GESAMTE Tabelle\n\ntages_verbrauch.write     .partitionBy(\"messtag\")     .mode(\"overwrite\")     .format(\"delta\")     .saveAsTable(\"dwh.zaehler_tagesverbrauch\")\n\n# → Nur relevante Partitionen werden gelesen\n# → 100x schneller als ohne Partitionierung\n```",
        "exercise": {
          "description": "Berechne für Smart Meter Daten (zaehler_id, messzeitpunkt, verbrauch_kwh): 1) Wochensummen pro Zähler, 2) Vollständigkeitsrate (Anteil nicht-NULL Werte), 3) Top 5 Zähler nach Verbrauch.",
          "sasSolution": "/* Wochenanalyse Smart Meter */\nPROC SQL;\n  CREATE TABLE wochen_analyse AS\n  SELECT\n    zaehler_id,\n    WEEK(messzeitpunkt)         AS woche,\n    YEAR(messzeitpunkt)         AS jahr,\n    SUM(verbrauch_kwh)          AS verbrauch_kwh_gesamt,\n    COUNT(*)                    AS messungen,\n    COUNT(verbrauch_kwh)        AS valide_messungen,\n    ROUND(COUNT(verbrauch_kwh)/COUNT(*)*100, 1) AS vollstaendigkeit_pct\n  FROM raw.zaehler_15min\n  GROUP BY zaehler_id, WEEK(messzeitpunkt), YEAR(messzeitpunkt)\n  ORDER BY verbrauch_kwh_gesamt DESC;\nQUIT;\n\n/* Top 5 Zähler */\nPROC SQL OUTOBS=5;\n  SELECT zaehler_id, SUM(verbrauch_kwh_gesamt) AS gesamt\n  FROM wochen_analyse\n  GROUP BY zaehler_id\n  ORDER BY gesamt DESC;\nQUIT;",
          "pysparkSolution": "from pyspark.sql import functions as F\n\ndf = spark.table('raw.zaehler_15min')\n\nwochen = df \\\n    .withColumn('woche', F.weekofyear('messzeitpunkt')) \\\n    .withColumn('jahr',  F.year('messzeitpunkt')) \\\n    .groupBy('zaehler_id', 'jahr', 'woche') \\\n    .agg(\n        F.sum('verbrauch_kwh').alias('verbrauch_gesamt'),\n        F.count('*').alias('messungen'),\n        F.count('verbrauch_kwh').alias('valide'),\n        F.round(F.count('verbrauch_kwh') / F.count('*') * 100, 1)\n         .alias('vollstaendigkeit_pct')\n    )\n\n# Top 5\nwochen.groupBy('zaehler_id') \\\n    .agg(F.sum('verbrauch_gesamt').alias('gesamt')) \\\n    .orderBy(F.desc('gesamt')) \\\n    .limit(5) \\\n    .show()",
          "hints": [
            "WEEK() in SAS und weekofyear() in PySpark geben die Kalenderwoche zurück",
            "COUNT(spalte) zählt nur nicht-NULL Werte — nutze das für Vollständigkeitsrate",
            "PROC SQL OUTOBS=5 begrenzt Output in SAS; .limit(5) in PySpark"
          ]
        }
