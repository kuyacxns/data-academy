<!DOCTYPE html>
<html lang="de">
<head>
  <!-- ── Favicon ── -->
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#0f1117">
  <meta name="application-name" content="SAS · PySpark Academy">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAS · PySpark · Academy</title>

  <!-- ── React 18 ── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- ── CodeMirror 5 ── -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/simple.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>

  <!-- ── Prism.js (Syntax-Highlighting im Theorie-Panel) ── -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-okaidia.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

  <!-- ── Fonts ── -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- ── App Styles ── -->
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <div id="root">
    <div style="color:#00ff88;font-family:monospace;padding:40px;font-size:18px">⏳ Lädt Academy...</div>
  </div>

  <!-- ── Module 1: Lesson data (MODULES constant) ── -->
  <script src="src/data.js"></script>

  <!-- ── Module 2: Markdown parser + HTML escaping ── -->
  <script src="src/utils.js"></script>

  <!-- ── Module 3: SAS syntax definitions (Prism + CodeMirror) ── -->
  <script src="src/syntax.js"></script>

  <!-- ── Module 4: Pixel-art canvas engine (plain JS) ── -->
  <script src="src/pixelart.js"></script>

  <!-- ── Module 5: React components + App (JSX via Babel) ── -->
  <script type="text/babel" src="src/app.jsx"></script>

  <!-- ── Module 6: DOM observers & parallax effects ── -->
  <script src="src/effects.js"></script>
</body>
</html>
